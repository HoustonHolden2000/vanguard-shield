services:
  - type: web
    name: vanguard-shield
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/shield.db
      - key: PHOTO_DIR
        value: /data/photos
    disk:
      name: shield-data
      mountPath: /data
      sizeGB: 1
