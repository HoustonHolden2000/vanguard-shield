<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Iron Halo Verify</title>
<script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.0.3000/dist/dbr.bundle.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #0C0C0C;
  color: #E0E0E0;
  min-height: 100vh;
  overflow-x: hidden;
}
.header {
  background: #111;
  border-bottom: 2px solid #0056A0;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
.header h1 .iron { color: #0056A0; }
.header h1 .halo { color: #fff; }
.header .subtitle { font-size: 10px; color: #666; letter-spacing: 1px; margin-top: 2px; }
.header .user-info { font-size: 12px; color: #0056A0; }
.header .logout-btn {
  background: none; border: 1px solid #333; color: #999;
  padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
}
.login-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 20px;
}
.login-box {
  background: #151515; border: 1px solid #222; border-radius: 12px;
  padding: 40px 30px; width: 100%; max-width: 340px; text-align: center;
}
.login-box .logo-text { font-size: 28px; font-weight: 700; letter-spacing: 3px; margin-bottom: 4px; }
.login-box .logo-text .iron { color: #0056A0; }
.login-box .logo-text .halo { color: #fff; }
.login-box .logo-sub { font-size: 11px; color: #555; letter-spacing: 2px; margin-bottom: 30px; }
.login-box input {
  width: 100%; padding: 12px 14px; margin-bottom: 12px;
  background: #0C0C0C; border: 1px solid #333; border-radius: 6px;
  color: #fff; font-size: 16px; outline: none;
}
.login-box input:focus { border-color: #0056A0; }
.login-box .login-btn {
  width: 100%; padding: 14px; margin-top: 8px;
  background: #0056A0; border: none; border-radius: 6px;
  color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: 1px;
}
.login-box .login-btn:active { background: #004080; }
.login-error { color: #CC3333; font-size: 13px; margin-top: 10px; min-height: 20px; }
.app-screen { display: none; }
.app-screen.active { display: block; }
.scan-section { padding: 20px 16px; }
.scan-btn {
  width: 100%; padding: 20px;
  background: linear-gradient(135deg, #0056A0, #003d73);
  border: none; border-radius: 10px;
  color: #fff; font-size: 18px; font-weight: 700;
  letter-spacing: 2px; cursor: pointer;
}
.scan-btn:active { background: linear-gradient(135deg, #004080, #002d55); }
.scan-hint { text-align: center; margin-top: 8px; font-size: 12px; color: #555; }
.status-bar {
  margin: 0 16px; padding: 12px 16px; border-radius: 8px;
  font-size: 14px; display: none; text-align: center; font-weight: 600;
}
.status-bar.processing { background: #1a1a2e; color: #5b8def; display: block; }
.status-bar.success { background: #0d1f0d; color: #2D8C3C; display: block; }
.status-bar.fail { background: #1f0d0d; color: #CC3333; display: block; }
.status-bar.partial { background: #1f1a0d; color: #D4A017; display: block; }
.result-card {
  margin: 16px; padding: 20px; background: #151515;
  border-radius: 10px; border: 1px solid #222; display: none;
}
.result-card.visible { display: block; }
.result-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #222;
}
.risk-badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 1px; }
.risk-green { background: #0d2618; color: #2D8C3C; border: 1px solid #2D8C3C; }
.risk-yellow { background: #261a0d; color: #D4A017; border: 1px solid #D4A017; }
.risk-red { background: #260d0d; color: #CC3333; border: 1px solid #CC3333; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-label { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.field-value { font-size: 15px; color: #fff; font-weight: 500; }
.field-value.empty { color: #444; font-style: italic; }
.field-full { grid-column: 1 / -1; }
.action-row { display: flex; gap: 10px; margin: 16px; }
.action-btn {
  flex: 1; padding: 14px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 1px;
}
.btn-save { background: #0056A0; color: #fff; }
.btn-retry { background: #222; color: #fff; border: 1px solid #333; }
.btn-retry-big {
  width: calc(100% - 32px); margin: 16px; padding: 16px;
  background: #CC3333; border: none; border-radius: 8px;
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  letter-spacing: 1px; display: none;
}
.nav-tabs {
  display: flex; border-top: 1px solid #222;
  position: fixed; bottom: 0; left: 0; right: 0; background: #111; z-index: 100;
}
.nav-tab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 11px;
  color: #555; cursor: pointer; border: none; background: none; letter-spacing: 1px;
}
.nav-tab.active { color: #0056A0; border-top: 2px solid #0056A0; }
.nav-tab .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }
.history-section { padding: 16px; padding-bottom: 80px; }
.history-item {
  background: #151515; border: 1px solid #222; border-radius: 8px;
  padding: 12px 14px; margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.history-name { font-size: 14px; color: #fff; font-weight: 500; }
.history-time { font-size: 11px; color: #555; }
.history-badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.empty-history { text-align: center; padding: 40px; color: #333; font-size: 14px; }
#cameraInput { display: none; }
.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 200;
  display: none; flex-direction: column; align-items: center; justify-content: center;
}
.loading-overlay.visible { display: flex; }
.loading-spinner {
  width: 48px; height: 48px; border: 3px solid #222;
  border-top-color: #0056A0; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { margin-top: 16px; font-size: 16px; color: #999; }
.loading-sub { margin-top: 6px; font-size: 12px; color: #444; }
.app-content { padding-bottom: 70px; }
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="logo-text"><span class="iron">IRON</span> <span class="halo">HALO</span></div>
    <div class="logo-sub">VERIFY</div>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username" autocapitalize="none">
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">ENTER</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
<div id="appScreen" class="app-screen">
  <div class="header">
    <div>
      <h1><span class="iron">IRON</span> <span class="halo">HALO</span></h1>
      <div class="subtitle">VERIFY</div>
    </div>
    <div style="text-align:right">
      <div class="user-info" id="userDisplay"></div>
      <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>
  <div class="app-content">
    <div id="tabScan" class="tab-content active">
      <div class="scan-section">
        <button class="scan-btn" onclick="startScan()">&#x1f4f7; SCAN LICENSE</button>
        <div class="scan-hint">Photograph the BACK of the driver's license</div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button onclick="manualEntry()" style="flex:1;padding:12px;background:#222;border:1px solid #333;border-radius:8px;color:#999;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:1px;">MANUAL ENTRY</button>
          <button onclick="dumpLastDecode()" style="flex:1;padding:12px;background:#111;border:1px solid #333;border-radius:8px;color:#555;font-size:11px;font-family:monospace;cursor:pointer;">DUMP LAST DECODE</button>
        </div>
      </div>
      <div class="status-bar" id="statusBar"></div>
      <div id="debugLine" style="margin:0 16px;padding:8px 12px;font-size:11px;font-family:monospace;color:#666;background:#111;border:1px solid #222;border-radius:6px;word-break:break-all;">DEBUG: waiting for scan</div>
      <div class="result-card" id="resultCard">
        <div class="result-header">
          <div style="font-size:14px;font-weight:600;color:#fff">SCAN RESULT</div>
          <div class="risk-badge" id="riskBadge">VERIFIED</div>
        </div>
        <div class="field-grid">
          <div class="field-item"><div class="field-label">First Name</div><div class="field-value" id="fFirstName">-</div></div>
          <div class="field-item"><div class="field-label">Last Name</div><div class="field-value" id="fLastName">-</div></div>
          <div class="field-item"><div class="field-label">Date of Birth</div><div class="field-value" id="fDOB">-</div></div>
          <div class="field-item"><div class="field-label">License Number</div><div class="field-value" id="fDLNumber">-</div></div>
          <div class="field-item"><div class="field-label">Expiration</div><div class="field-value" id="fExpiration">-</div></div>
          <div class="field-item"><div class="field-label">State</div><div class="field-value" id="fState">-</div></div>
          <div class="field-item field-full"><div class="field-label">Address</div><div class="field-value" id="fAddress">-</div></div>
        </div>
      </div>
      <div class="action-row" id="actionRow" style="display:none">
        <button class="action-btn btn-retry" onclick="startScan()">RESCAN</button>
        <button class="action-btn btn-save" onclick="saveScan()">SAVE</button>
      </div>
      <button class="btn-retry-big" id="retryBtn" onclick="startScan()">SCAN FAILED - TAP TO RETRY</button>
    </div>
    <div id="tabHistory" class="tab-content" style="display:none">
      <div class="history-section" id="historyList"><div class="empty-history">No scans yet</div></div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('Scan')"><span class="tab-icon">&#x1f50d;</span>SCAN</button>
    <button class="nav-tab" onclick="switchTab('History')"><span class="tab-icon">&#x1f4cb;</span>HISTORY</button>
  </div>
</div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">Processing...</div>
  <div class="loading-sub" id="loadingSub"></div>
</div>
<input type="file" id="cameraInput" accept="image/*" capture="environment">
<script>
let currentUser=null,lastScanData=null,sdkReady=false,cvRouter=null,parser=null;

async function initSDK(){
  try{
    Dynamsoft.License.LicenseManager.initLicense("DLS2eyJoYW5kc2hha2VDb2RlIjoiMTA1MjUzODIxLU1UQTFNalV6T0RJeExYZGxZaTFVY21saGJGQnliMm8iLCJtYWluU2VydmVyVVJMIjoiaHR0cHM6Ly9tZGxzLmR5bmFtc29mdG9ubGluZS5jb20vIiwib3JnYW5pemF0aW9uSUQiOiIxMDUyNTM4MjEiLCJzdGFuZGJ5U2VydmVyVVJMIjoiaHR0cHM6Ly9zZGxzLmR5bmFtc29mdG9ubGluZS5jb20vIiwiY2hlY2tDb2RlIjotMTcyMDI3MzcyOX0=");
    await Dynamsoft.Core.CoreModule.loadWasm(["DBR","DCP"]);
    await Dynamsoft.DCP.CodeParserModule.loadSpec("AAMVA_DL_ID");
    await Dynamsoft.DCP.CodeParserModule.loadSpec("AAMVA_DL_ID_WITH_MAG_STRIPE");
    cvRouter=await Dynamsoft.CVR.CaptureVisionRouter.createInstance();
    parser=await Dynamsoft.DCP.CodeParser.createInstance();
    sdkReady=true;
    console.log("Iron Halo: SDK ready");
  }catch(e){
    console.error("SDK init error:",e);
    try{cvRouter=await Dynamsoft.CVR.CaptureVisionRouter.createInstance();sdkReady=true;}catch(e2){console.error("SDK total failure:",e2);}
  }
}

async function doLogin(){
  const user=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  const errEl=document.getElementById('loginError');
  errEl.textContent='';
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    const data=await res.json();
    if(data.success){
      currentUser={username:user,role:data.role,name:data.name};
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appScreen').classList.add('active');
      document.getElementById('userDisplay').textContent=data.name+' ('+data.role+')';
      if(!sdkReady)initSDK();
    }else{errEl.textContent='Invalid credentials';}
  }catch(e){errEl.textContent='Connection error';}
}

function doLogout(){
  currentUser=null;
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  resetScanUI();
}

document.getElementById('loginPass').addEventListener('keyup',function(e){if(e.key==='Enter')doLogin();});

function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab'+tab).style.display='block';
  event.currentTarget.classList.add('active');
  if(tab==='History')loadHistory();
}

function startScan(){resetScanUI();document.getElementById('cameraInput').click();}

document.getElementById('cameraInput').addEventListener('change',async function(e){
  const file=e.target.files[0];if(!file)return;this.value='';
  showLoading('Opening photo...','');
  const img=new Image();
  img.onload=async function(){await processImage(img);};
  img.onerror=function(){hideLoading();showStatus('fail','Could not load photo.');showRetryBtn();};
  img.src=URL.createObjectURL(file);
});

function getRawCanvas(img){
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
  const MAX=4000;
  if(w>MAX||h>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
  canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h);
  return canvas;
}

function preprocessCanvas(img,contrastLevel,invert){
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
  const MAX=3000;
  if(w>MAX||h>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
  canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h);
  const imageData=ctx.getImageData(0,0,w,h);
  const data=imageData.data;const contrast=contrastLevel||1.5;
  for(let i=0;i<data.length;i+=4){
    let gray=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
    gray=((gray-128)*contrast)+128;
    gray=Math.min(255,Math.max(0,gray));
    if(invert)gray=255-gray;
    data[i]=data[i+1]=data[i+2]=gray;
  }
  ctx.putImageData(imageData,0,0);return canvas;
}

let debugLog=[];
let lastDecodeData={items:null,barcodeText:null,parserJSON:null,passResults:[]};

function dbg(msg){debugLog.push(msg);console.log('[Halo] '+msg);}

function showDebug(msg){
  const el=document.getElementById('debugLine');
  el.textContent='DEBUG: '+msg;
  el.style.display='block';
}

function dumpLastDecode(){
  console.log('=== IRON HALO DEBUG DUMP ===');
  console.log('sdkReady:',sdkReady,'cvRouter:',!!cvRouter,'parser:',!!parser);
  console.log('debugLog:',debugLog);
  if(lastDecodeData.passResults.length>0){
    lastDecodeData.passResults.forEach((pr,i)=>{
      console.log('Pass '+(i+1)+': '+pr.label+' => '+pr.itemCount+' items, '+pr.ms+'ms');
      if(pr.types)console.log('  types: '+pr.types);
    });
  }else{console.log('No pass results recorded');}
  if(lastDecodeData.barcodeText)console.log('Raw barcode text:',lastDecodeData.barcodeText);
  if(lastDecodeData.parserJSON)console.log('Parser JSON:',JSON.stringify(lastDecodeData.parserJSON,null,2));
  // Also show on screen
  let summary='sdkReady='+sdkReady+' cvRouter='+!!cvRouter+' parser='+!!parser;
  if(lastDecodeData.passResults.length>0){
    summary+='\n'+lastDecodeData.passResults.map((pr,i)=>'P'+(i+1)+':'+pr.itemCount+'items/'+pr.ms+'ms').join(' | ');
  }
  if(lastDecodeData.barcodeText)summary+='\nBarcode: '+lastDecodeData.barcodeText.substring(0,100)+'...';
  showDebug(summary);
  console.log('=== END DUMP ===');
}

function manualEntry(){
  alert('Manual Entry: not yet wired in this debug build. Use SCAN LICENSE for now.');
}

async function processImage(img){
  debugLog=[];
  lastDecodeData={items:null,barcodeText:null,parserJSON:null,passResults:[]};
  document.getElementById('debugLine').style.display='none';

  const w=img.naturalWidth||img.width;
  const h=img.naturalHeight||img.height;
  dbg('Photo: '+w+'x'+h);

  if(!sdkReady||!cvRouter){
    showLoading('Initializing scanner...','First scan takes a moment');
    dbg('SDK not ready, calling initSDK...');
    await initSDK();
    if(!sdkReady){hideLoading();showStatus('fail','Scanner engine failed to load.');showDebug('ENGINE INIT FAILED. sdkReady='+sdkReady);showRetryBtn();return;}
    dbg('SDK init complete. sdkReady='+sdkReady+' cvRouter='+!!cvRouter+' parser='+!!parser);
  }

  const passes=[
    {label:'Reading barcode...',contrast:0,invert:false,template:'ReadBarcodes_Balance'},
    {label:'Trying high-res...',contrast:0,invert:false,template:'ReadBarcodes_ReadRateFirst'},
    {label:'Enhancing image...',contrast:1.3,invert:false,template:'ReadBarcodes_Balance'},
    {label:'Boosting contrast...',contrast:1.8,invert:false,template:'ReadBarcodes_ReadRateFirst'},
    {label:'Deep scan...',contrast:2.2,invert:false,template:'ReadBarcodes_ReadRateFirst'},
    {label:'Trying inverted...',contrast:1.5,invert:true,template:'ReadBarcodes_ReadRateFirst'},
  ];

  let barcodeItem=null;
  let totalMs=0;
  const t0=performance.now();

  for(let p=0;p<passes.length;p++){
    showLoading(passes[p].label,'Attempt '+(p+1)+' of '+passes.length);
    const pt0=performance.now();
    try{
      const canvas=(passes[p].contrast===0)?getRawCanvas(img):preprocessCanvas(img,passes[p].contrast,passes[p].invert);
      dbg('Pass '+(p+1)+': '+passes[p].template+' (contrast='+passes[p].contrast+', invert='+passes[p].invert+') canvas='+canvas.width+'x'+canvas.height);
      const result=await cvRouter.capture(canvas,passes[p].template);
      const pt1=performance.now();
      const pms=Math.round(pt1-pt0);
      const itemCount=(result&&result.items)?result.items.length:0;
      const types=(result&&result.items)?result.items.map(it=>'type='+it.type+(it.formatString?('/'+it.formatString):'')).join(', '):'none';
      dbg('Pass '+(p+1)+': '+itemCount+' items in '+pms+'ms ['+types+']');
      lastDecodeData.passResults.push({label:passes[p].label,itemCount:itemCount,ms:pms,types:types});

      if(result&&result.items){
        for(let i=0;i<result.items.length;i++){
          const it=result.items[i];
          try{
            const txt=it.text||new TextDecoder().decode(new Uint8Array(it.bytes||[]));
            dbg('  item['+i+'] type='+it.type+' bytes='+(it.bytes?it.bytes.length:0)+' text='+txt.substring(0,80));
          }catch(e){dbg('  item['+i+'] type='+it.type+' (could not read text)');}
        }
        barcodeItem=result.items.find(item=>item.type===2||item.type===Dynamsoft.Core.EnumCapturedResultItemType.CRIT_BARCODE);
        if(barcodeItem){dbg('BARCODE FOUND on pass '+(p+1));break;}
      }
    }catch(e){
      const pt1=performance.now();
      dbg('Pass '+(p+1)+' THREW: '+e.message+' ('+Math.round(pt1-pt0)+'ms)');
      lastDecodeData.passResults.push({label:passes[p].label,itemCount:0,ms:Math.round(pt1-pt0),types:'ERROR: '+e.message});
    }
  }

  totalMs=Math.round(performance.now()-t0);
  dbg('All passes done. totalMs='+totalMs+' barcodeFound='+!!barcodeItem);

  if(!barcodeItem){
    hideLoading();
    const passSum=lastDecodeData.passResults.map((pr,i)=>'P'+(i+1)+':'+pr.itemCount).join(' ');
    showStatus('fail','No barcode detected. Make sure the BACK of the license is visible and well-lit.');
    showDebug('0 barcodes found. '+passes.length+' passes, '+totalMs+'ms. Photo='+w+'x'+h+'. '+passSum);
    showRetryBtn();
    return;
  }

  // Extract raw barcode text for debug
  try{
    lastDecodeData.barcodeText=barcodeItem.text||new TextDecoder().decode(new Uint8Array(barcodeItem.bytes||[]));
    dbg('Raw barcode text ('+lastDecodeData.barcodeText.length+' chars): '+lastDecodeData.barcodeText.substring(0,200));
  }catch(e){dbg('Could not extract barcode text: '+e.message);}

  showLoading('Extracting license data...','');
  const fields=await parseLicense(barcodeItem);
  hideLoading();
  if(fields&&Object.keys(fields).length>0){
    dbg('SUCCESS: fields='+JSON.stringify(fields));
    showDebug('DECODED OK. '+Object.keys(fields).length+' fields in '+totalMs+'ms');
    displayResult(fields);
  }else{
    dbg('FAIL: barcode found but no fields extracted');
    showStatus('fail','Barcode found but parser failed. Keys: ' + Object.keys(barcodeItem).join(','));
    showDebug('Barcode found but 0 fields extracted. '+totalMs+'ms. Tap DUMP for raw data.');
    showRetryBtn();
  }
}

async function parseLicense(barcodeItem){
  let fields={};
  let rawText='';

  // Get text from every possible source
  if(barcodeItem.text) rawText=barcodeItem.text;
  else if(barcodeItem.barcodeText) rawText=barcodeItem.barcodeText;

  // Convert bytes to string directly - this is the primary path
  if((!rawText||rawText.length<20)&&barcodeItem.bytes){
    try{
      const bytes=barcodeItem.bytes instanceof Uint8Array?barcodeItem.bytes:new Uint8Array(barcodeItem.bytes);
      rawText=new TextDecoder('utf-8').decode(bytes);
      if(!rawText||rawText.length<20) rawText=new TextDecoder('latin1').decode(bytes);
    }catch(e){console.warn('Byte decode failed:',e);}
  }

  console.log('RAW TEXT LENGTH:',rawText.length);
  console.log('RAW TEXT PREVIEW:',rawText.substring(0,200));

  // Try CodeParser first if available
  if(parser&&barcodeItem.bytes){
    try{
      const parsed=await parser.parse(barcodeItem.bytes);
      if(parsed){
        // v11 may use different output formats
        let jsonStr=parsed.jsonString||parsed.getJsonString&&parsed.getJsonString()||null;
        if(jsonStr){
          const dlInfo=JSON.parse(jsonStr);
          fields=extractFieldsFromCodeParser(dlInfo);
          if(fields.lastName||fields.firstName||fields.dlNumber)return fields;
        }
        // Try getting fields directly from parsed object
        const parsedKeys=Object.keys(parsed);
        console.log('PARSER KEYS:',parsedKeys.join(','));
      }
    }catch(e){console.warn('CodeParser error:',e.message);}
  }

  // AAMVA text parse - primary reliable path
  if(rawText.length>20){
    fields=parseAAMVAText(rawText);
    if(fields.lastName||fields.firstName||fields.dlNumber)return fields;
  }

  return fields;
}

function extractFieldsFromCodeParser(dlInfo){
  const fields={};const flat=flattenObject(dlInfo);
  const mapping={
    firstName:['firstName','First Name','DAC','first_name','givenName','Given Name','DCT'],
    lastName:['lastName','Last Name','DCS','last_name','familyName','Family Name','surname','Surname'],
    dob:['dateOfBirth','Date of Birth','DBB','date_of_birth','birthDate','Birth Date','DOB'],
    dlNumber:['licenseNumber','License Number','DAQ','license_number','documentNumber','Document Number','DL Number'],
    expiration:['expirationDate','Expiration Date','DBA','expiration_date','Expiry Date'],
    state:['state','State','DAJ','jurisdictionCode','Jurisdiction Code','issuingJurisdiction'],
    street:['street','Street','DAG','street_address','addressStreet','Address Street','Address - Street 1'],
    city:['city','City','DAI','addressCity','Address - City'],
    zip:['zip','ZIP','DAK','postalCode','Postal Code','zipCode','Address - Postal Code']
  };
  for(const[field,keys]of Object.entries(mapping)){for(const key of keys){const val=flat[key];if(val&&String(val).trim()){fields[field]=String(val).trim();break;}}}
  return fields;
}

function flattenObject(obj,prefix,result){
  result=result||{};prefix=prefix||'';
  if(!obj||typeof obj!=='object')return result;
  for(const key of Object.keys(obj)){
    const val=obj[key];const newKey=prefix?prefix+'.'+key:key;
    if(val&&typeof val==='object'&&!Array.isArray(val)){flattenObject(val,newKey,result);}
    else{result[key]=val;result[newKey]=val;}
  }
  return result;
}

function parseAAMVAText(raw){
  const fields={};
  const codes={DCS:'lastName',DAC:'firstName',DCT:'firstName',DBB:'dob',DAQ:'dlNumber',DBA:'expiration',DAJ:'state',DAG:'street',DAI:'city',DAK:'zip'};
  const lines=raw.split(/[\n\r]+/);
  for(const line of lines){for(const[code,field]of Object.entries(codes)){
    if(line.startsWith(code)||line.includes(code)){
      const idx=line.indexOf(code);let val=line.substring(idx+code.length).trim();
      if(val&&!fields[field])fields[field]=val;
    }
  }}
  if(fields.dob&&fields.dob.length===8&&!fields.dob.includes('/'))fields.dob=fields.dob.slice(0,2)+'/'+fields.dob.slice(2,4)+'/'+fields.dob.slice(4);
  if(fields.expiration&&fields.expiration.length===8&&!fields.expiration.includes('/'))fields.expiration=fields.expiration.slice(0,2)+'/'+fields.expiration.slice(2,4)+'/'+fields.expiration.slice(4);
  if(fields.zip&&fields.zip.length>5)fields.zip=fields.zip.substring(0,5);
  return fields;
}

function displayResult(fields){
  lastScanData=fields;
  const setField=(id,val)=>{const el=document.getElementById(id);if(val&&val!=='-'){el.textContent=val;el.classList.remove('empty');}else{el.textContent='-';el.classList.add('empty');}};
  setField('fFirstName',fields.firstName);setField('fLastName',fields.lastName);
  setField('fDOB',fields.dob);setField('fDLNumber',fields.dlNumber);
  setField('fExpiration',fields.expiration);setField('fState',fields.state);
  let addr=[fields.street,fields.city,fields.state,fields.zip].filter(Boolean).join(', ');
  setField('fAddress',addr||null);
  const filled=[fields.firstName,fields.lastName,fields.dob,fields.dlNumber,fields.expiration,fields.state,fields.street].filter(Boolean).length;
  const badge=document.getElementById('riskBadge');
  if(filled>=5){badge.textContent='VERIFIED';badge.className='risk-badge risk-green';showStatus('success','License decoded - '+filled+'/7 fields');}
  else if(filled>=3){badge.textContent='PARTIAL';badge.className='risk-badge risk-yellow';showStatus('partial','Partial decode - '+filled+'/7 fields');}
  else{badge.textContent='INCOMPLETE';badge.className='risk-badge risk-red';showStatus('partial','Limited decode - '+filled+'/7 fields');}
  document.getElementById('resultCard').classList.add('visible');
  document.getElementById('actionRow').style.display='flex';
  document.getElementById('retryBtn').style.display='none';
}

async function saveScan(){
  if(!lastScanData)return;
  try{
    await fetch('/api/scans',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...lastScanData,scannedBy:currentUser?currentUser.username:'unknown'})});
    showStatus('success','Scan saved');setTimeout(()=>resetScanUI(),1500);
  }catch(e){showStatus('fail','Failed to save');}
}

async function loadHistory(){
  try{
    const res=await fetch('/api/scans');const data=await res.json();
    const el=document.getElementById('historyList');
    if(!data.scans||data.scans.length===0){el.innerHTML='<div class="empty-history">No scans yet</div>';return;}
    el.innerHTML=data.scans.map(s=>{
      const name=[s.firstName,s.lastName].filter(Boolean).join(' ')||'Unknown';
      const time=new Date(s.timestamp).toLocaleString();
      const filled=[s.firstName,s.lastName,s.dob,s.dlNumber,s.expiration,s.state,s.street].filter(Boolean).length;
      const color=filled>=5?'#2D8C3C':filled>=3?'#D4A017':'#CC3333';
      const label=filled>=5?'VERIFIED':filled>=3?'PARTIAL':'INCOMPLETE';
      return '<div class="history-item"><div><div class="history-name">'+name+'</div><div class="history-time">'+time+'</div></div><div class="history-badge" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'">'+label+'</div></div>';
    }).join('');
  }catch(e){console.error("History load failed:",e);}
}

function showStatus(type,msg){const el=document.getElementById('statusBar');el.className='status-bar '+type;el.textContent=msg;}
function showRetryBtn(){document.getElementById('retryBtn').style.display='block';document.getElementById('actionRow').style.display='none';}
function showLoading(text,sub){document.getElementById('loadingText').textContent=text;document.getElementById('loadingSub').textContent=sub||'';document.getElementById('loadingOverlay').classList.add('visible');}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('visible');}
function resetScanUI(){
  document.getElementById('statusBar').className='status-bar';
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('actionRow').style.display='none';
  document.getElementById('retryBtn').style.display='none';
  lastScanData=null;
  ['fFirstName','fLastName','fDOB','fDLNumber','fExpiration','fState','fAddress'].forEach(id=>{const el=document.getElementById(id);el.textContent='-';el.classList.add('empty');});
}
</script>
