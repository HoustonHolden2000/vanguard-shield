<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Iron Halo — Vanguard Shield</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --blue: #0056A0;
    --blue-light: #0070CC;
    --green: #00C853;
    --yellow: #FFD600;
    --red: #FF1744;
    --text: #FFFFFF;
    --text2: #999999;
    --text3: #666666;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }

  /* ── Screens ── */
  .screen { display: none; min-height: 100dvh; padding: 24px 20px; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── Login ── */
  #login-screen { justify-content: center; align-items: center; gap: 24px; }
  #login-screen h1 { font-size: 22px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  #login-screen h1 span { color: var(--blue); }
  .login-form { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
  .login-form input { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; color: var(--text); font-size: 16px; outline: none; }
  .login-form input:focus { border-color: var(--blue); }
  .login-error { color: var(--red); font-size: 13px; text-align: center; min-height: 18px; }

  /* ── Header ── */
  .hdr { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; flex-shrink: 0; }
  .hdr-title { font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .hdr-title span { color: var(--blue); }
  .hdr-back { background: none; border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: var(--radius); font-size: 12px; cursor: pointer; }

  /* ── Scan Screen ── */
  #scan-screen { justify-content: center; align-items: center; gap: 32px; }
  .scan-hero { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .scan-btn { width: 160px; height: 160px; border-radius: 50%; background: var(--blue); border: 4px solid var(--blue-light); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 0 40px rgba(0,86,160,0.3); }
  .scan-btn:active { transform: scale(0.94); }
  .scan-btn svg { width: 64px; height: 64px; fill: var(--text); }
  .scan-sub { color: var(--text2); font-size: 14px; text-align: center; line-height: 1.5; }
  .btn-manual { margin-top: 8px; }

  /* ── Overlay ── */
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; flex-direction: column; gap: 16px; }
  #overlay.active { display: flex; }
  .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #overlay-text { font-size: 16px; color: var(--text2); }

  /* ── Green Flash ── */
  .green-flash { position: fixed; inset: 0; background: var(--green); opacity: 0; z-index: 200; pointer-events: none; animation: flash 0.4s ease-out forwards; }
  @keyframes flash { 0% { opacity: 0.45; } 100% { opacity: 0; } }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--red); color: var(--text); padding: 14px 20px; border-radius: var(--radius); font-size: 14px; z-index: 300; max-width: 90%; text-align: center; display: none; }
  #toast.show { display: block; animation: fadeIn 0.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* ── Fields Grid (Confirm + Manual) ── */
  .fields-grid { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; padding-bottom: 8px; }
  .field-row { display: flex; flex-direction: column; gap: 4px; }
  .field-row label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 600; }
  .field-row input, .field-row select { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; color: var(--text); font-size: 15px; outline: none; }
  .field-row input:focus, .field-row select:focus { border-color: var(--blue); }
  .field-row select { appearance: none; }
  .field-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-row { display: flex; gap: 10px; padding-top: 8px; flex-shrink: 0; }

  /* ── Buttons ── */
  .btn { padding: 14px 24px; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; border: none; text-align: center; }
  .btn-blue { background: var(--blue); color: var(--text); }
  .btn-blue:active { background: var(--blue-light); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-danger { background: var(--red); color: var(--text); }
  .btn-full { width: 100%; }

  /* ── Result Screen ── */
  #result-screen { justify-content: center; align-items: center; gap: 20px; }
  .risk-gauge { position: relative; width: 180px; height: 180px; }
  .risk-gauge svg { width: 180px; height: 180px; transform: rotate(-90deg); }
  .risk-gauge circle { fill: none; stroke-width: 10; stroke-linecap: round; }
  .risk-gauge .bg { stroke: var(--border); }
  .risk-gauge .fill { stroke-dasharray: 314; stroke-dashoffset: 314; transition: stroke-dashoffset 1s ease-out; }
  .risk-gauge .fill.GREEN { stroke: var(--green); }
  .risk-gauge .fill.YELLOW { stroke: var(--yellow); }
  .risk-gauge .fill.RED { stroke: var(--red); animation: pulse-gauge 1.5s infinite; }
  @keyframes pulse-gauge { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .risk-score-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: 800; }
  .risk-label { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
  .risk-flags { width: 100%; text-align: left; }
  .risk-flag { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #111; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
  .risk-flag::before { content: '\26A0'; font-size: 16px; }
  .risk-name { font-size: 16px; color: var(--text2); }
  .result-actions { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }

  /* ── Camera input (hidden) ── */
  #cam-input { display: none; }

  /* ── Init banner ── */
  #init-banner { position: fixed; top: 0; left: 0; right: 0; background: var(--blue); color: var(--text); text-align: center; padding: 8px; font-size: 13px; font-weight: 600; z-index: 400; display: none; }
  #init-banner.show { display: block; }
</style>
</head>
<body>

<!-- INIT BANNER -->
<div id="init-banner">Loading barcode engine...</div>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <h1>Iron <span>Halo</span></h1>
  <form class="login-form" id="login-form">
    <input type="text" id="login-user" placeholder="Username" autocomplete="username" required>
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password" required>
    <button type="submit" class="btn btn-blue btn-full">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </form>
</div>

<!-- SCAN -->
<div id="scan-screen" class="screen">
  <div class="hdr">
    <div class="hdr-title">Iron <span>Halo</span></div>
    <button class="hdr-back" id="btn-logout">Logout</button>
  </div>
  <div class="scan-hero">
    <button class="scan-btn" id="btn-scan" aria-label="Scan barcode">
      <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Zm0 1.8a5 5 0 1 1 0-10 5 5 0 0 1 0 10ZM4.929 4.929A10 10 0 0 1 12 2v2a8 8 0 0 0-5.657 2.343L4.93 4.93ZM2 12a10 10 0 0 1 2.929-7.071l1.414 1.414A8 8 0 0 0 4 12H2Zm2.929 7.071A10 10 0 0 1 2 12h2a8 8 0 0 0 2.343 5.657l-1.414 1.414ZM12 22a10 10 0 0 1-7.071-2.929l1.414-1.414A8 8 0 0 0 12 20v2Zm7.071-2.929A10 10 0 0 1 12 22v-2a8 8 0 0 0 5.657-2.343l1.414 1.414ZM22 12a10 10 0 0 1-2.929 7.071l-1.414-1.414A8 8 0 0 0 20 12h2Zm-2.929-7.071A10 10 0 0 1 22 12h-2a8 8 0 0 0-2.343-5.657l1.414-1.414ZM12 2a10 10 0 0 1 7.071 2.929l-1.414 1.414A8 8 0 0 0 12 4V2Z"/></svg>
    </button>
    <div class="scan-sub">Tap to take photo of back barcode.</div>
    <button class="btn btn-outline btn-manual" id="btn-manual">Manual Entry</button>
    <button onclick="dumpRawDecode()" style="margin-top:24px;background:none;border:1px solid #333;color:#666;padding:8px 16px;border-radius:6px;font-size:11px;font-family:monospace;cursor:pointer;">Dump Last Decode (console)</button>
  </div>
</div>

<!-- CONFIRM (populated by scan decode) -->
<div id="confirm-screen" class="screen">
  <div class="hdr">
    <div class="hdr-title">Confirm <span>Scan</span></div>
    <button class="hdr-back" onclick="showScreen('scan-screen')">Back</button>
  </div>
  <div class="fields-grid" id="confirm-fields"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="showScreen('scan-screen')" style="flex:1">Cancel</button>
    <button class="btn btn-blue" id="btn-confirm" style="flex:2">Confirm &amp; Save</button>
  </div>
</div>

<!-- MANUAL ENTRY -->
<div id="manual-screen" class="screen">
  <div class="hdr">
    <div class="hdr-title">Manual <span>Entry</span></div>
    <button class="hdr-back" onclick="showScreen('scan-screen')">Back</button>
  </div>
  <div class="fields-grid" id="manual-fields"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="showScreen('scan-screen')" style="flex:1">Cancel</button>
    <button class="btn btn-blue" id="btn-manual-save" style="flex:2">Save</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="risk-gauge">
    <svg viewBox="0 0 120 120">
      <circle class="bg" cx="60" cy="60" r="50"/>
      <circle class="fill" id="risk-circle" cx="60" cy="60" r="50"/>
    </svg>
    <div class="risk-score-num" id="risk-score-num">0</div>
  </div>
  <div class="risk-label" id="risk-label">ASSESSED</div>
  <div class="risk-name" id="risk-name"></div>
  <div class="risk-flags" id="risk-flags"></div>
  <div class="result-actions" id="result-actions">
    <button class="btn btn-blue btn-full" onclick="showScreen('scan-screen')">New Scan</button>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="spinner"></div>
  <div id="overlay-text">Decoding barcode...</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- CAMERA INPUT -->
<input type="file" id="cam-input" accept="image/*" capture="environment">

<!-- DYNAMSOFT v11 CDN -->
<script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.0.3000/dist/dbr.bundle.js"></script>
<script src="app.js"></script>
</body>
</html>
