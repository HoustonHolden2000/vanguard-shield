<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Iron Halo Verify</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#14141f;--card:#1a1a2e;--border:#2a2a3e;--blue:#0056A0;--green:#00c853;--red:#ff3d3d;--amber:#ffab00;--text:#e8e8f0;--muted:#8888a0;--radius:12px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent;overflow:hidden}
input,button,select,textarea{font-family:inherit;font-size:inherit}
#app{height:100%;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;padding:16px;padding-bottom:100px}
.screen.active{display:flex}
.header{background:var(--surface);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.header h1{font-size:16px;font-weight:700;color:var(--blue)}
.header .ub{font-size:12px;color:var(--muted)}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;background:none;border:none;color:var(--muted);padding:10px 4px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.nav button.active{color:var(--blue)}
.nav button svg{width:22px;height:22px}
.btn{display:flex;align-items:center;justify-content:center;padding:16px 24px;border:none;border-radius:var(--radius);font-size:18px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s;-webkit-appearance:none}
.btn:active{opacity:.7}
.btn-primary{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}
.btn-sm{padding:10px 16px;font-size:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card-value{font-size:18px;font-weight:600}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-size:16px;-webkit-appearance:none}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--blue)}
.risk-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}
.risk-low{background:#1a3a1a;color:var(--green)}
.risk-med{background:#3a3a1a;color:var(--amber)}
.risk-high{background:#3a1a1a;color:var(--red)}
.scan-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:40px 20px}
.scan-btn-big{width:160px;height:160px;border-radius:50%;background:var(--blue);border:4px solid rgba(0,86,160,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 40px rgba(0,86,160,.2);transition:transform .15s}
.scan-btn-big:active{transform:scale(.95)}
.scan-btn-big svg{width:64px;height:64px;fill:#fff}
.confirm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.confirm-grid .card{margin-bottom:0}
.confirm-grid .full{grid-column:1/-1}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.overlay.hidden{display:none}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:16px;right:16px;padding:14px 16px;border-radius:10px;font-size:14px;font-weight:600;z-index:1000;transform:translateY(-120%);transition:transform .3s;text-align:center}
.toast.show{transform:translateY(0)}
.toast-success{background:var(--green);color:#000}
.toast-error{background:var(--red);color:#fff}
.toast-info{background:var(--blue);color:#fff}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:800}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.scan-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.scan-item-name{font-size:15px;font-weight:600}
.scan-item-meta{font-size:12px;color:var(--muted)}
.photo-preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;border:1px solid var(--border);margin-bottom:12px}
.login-box{max-width:340px;margin:auto;width:100%}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h2{font-size:22px;color:var(--blue);margin-bottom:4px;letter-spacing:1px}
.login-logo p{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div class="header" id="hdr" style="display:none">
    <h1>IRON HALO VERIFY</h1>
    <span class="ub" id="ubadge"></span>
  </div>

  <!-- LOGIN -->
  <div class="screen active" id="s-login">
    <div style="flex:1;display:flex;align-items:center;justify-content:center">
      <div class="login-box">
        <div class="login-logo"><h2>IRON HALO VERIFY</h2><p>Guard Verification System v3.1</p></div>
        <div class="field"><label>Username</label><input type="text" id="l-user" autocapitalize="none" autocomplete="username"></div>
        <div class="field"><label>Password</label><input type="password" id="l-pass" autocomplete="current-password"></div>
        <button class="btn btn-primary" onclick="doLogin()" id="l-btn">Sign In</button>
        <p id="l-err" style="color:var(--red);text-align:center;margin-top:12px;font-size:13px"></p>
      </div>
    </div>
  </div>

  <!-- SCAN -->
  <div class="screen" id="s-scan">
    <div class="scan-hero">
      <div class="scan-btn-big" onclick="document.getElementById('cam').click()">
        <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 100-6.4 3.2 3.2 0 000 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
      </div>
      <div style="font-size:20px;font-weight:700">SCAN LICENSE</div>
      <div style="font-size:13px;color:var(--muted);text-align:center;max-width:260px">Take a photo of the <strong>back</strong> of the driver's license (barcode side)</div>
      <input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
    </div>
    <button class="btn btn-outline btn-sm" onclick="showS('s-manual')" style="margin-top:auto">Manual Entry</button>
  </div>

  <!-- PROCESSING -->
  <div class="overlay hidden" id="ov">
    <div class="spinner"></div>
    <div style="font-size:16px;font-weight:600">Reading barcode...</div>
    <div style="font-size:13px;color:var(--muted)">Analyzing photo server-side</div>
  </div>

  <!-- CONFIRM -->
  <div class="screen" id="s-confirm">
    <h2 style="margin-bottom:4px;font-size:18px">Verify Details</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px" id="c-src"></p>
    <img id="c-photo" class="photo-preview" style="display:none">
    <div class="confirm-grid" id="c-fields"></div>
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-green" onclick="confirmScan()">&#10003; CONFIRM &amp; SAVE</button>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline btn-sm" onclick="editConfirm()" style="flex:1">Edit</button>
        <button class="btn btn-outline btn-sm" onclick="showS('s-scan')" style="flex:1">Re-scan</button>
      </div>
    </div>
  </div>

  <!-- EDIT -->
  <div class="screen" id="s-edit">
    <h2 style="margin-bottom:14px;font-size:18px">Edit Details</h2>
    <img id="e-photo" class="photo-preview" style="display:none">
    <div id="e-fields"></div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-green" onclick="saveEdit()" style="flex:1">Save</button>
      <button class="btn btn-outline btn-sm" onclick="backConfirm()" style="flex:1">Cancel</button>
    </div>
  </div>

  <!-- MANUAL -->
  <div class="screen" id="s-manual">
    <h2 style="margin-bottom:14px;font-size:18px">Manual Entry</h2>
    <div class="field"><label>First Name</label><input id="m-first" autocapitalize="words"></div>
    <div class="field"><label>Last Name</label><input id="m-last" autocapitalize="words"></div>
    <div class="field"><label>DL Number</label><input id="m-dl" autocapitalize="characters"></div>
    <div class="field"><label>DOB (MM/DD/YYYY)</label><input id="m-dob" inputmode="numeric"></div>
    <div class="field"><label>Expiration</label><input id="m-exp" inputmode="numeric"></div>
    <div class="field"><label>State</label><input id="m-state" maxlength="2" autocapitalize="characters" value="TN"></div>
    <div class="field"><label>Notes</label><textarea id="m-notes" rows="2"></textarea></div>
    <button class="btn btn-green" onclick="submitManual()">Submit</button>
    <button class="btn btn-outline btn-sm" onclick="showS('s-scan')" style="margin-top:10px">Cancel</button>
  </div>

  <!-- RESULT -->
  <div class="screen" id="s-result">
    <div style="text-align:center;padding:30px 0">
      <div id="r-icon" style="font-size:64px;margin-bottom:12px"></div>
      <div id="r-status" style="font-size:22px;font-weight:800;margin-bottom:8px"></div>
      <div id="r-score"></div>
      <div id="r-flags" style="margin-top:12px;font-size:13px;color:var(--amber)"></div>
    </div>
    <div id="r-detail" class="card" style="margin-bottom:16px"></div>
    <button class="btn btn-primary" onclick="showS('s-scan')">Next Scan</button>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="s-history">
    <h2 style="margin-bottom:14px;font-size:18px">Recent Scans</h2>
    <div id="h-list"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="screen" id="s-dash">
    <h2 style="margin-bottom:14px;font-size:18px">Dashboard</h2>
    <div class="stat-grid" id="d-stats"></div>
    <div class="card"><div class="card-label">Decode Engine</div><div id="d-decode" style="font-size:14px;margin-top:4px"></div></div>
    <h3 style="font-size:14px;margin:14px 0 8px;color:var(--muted)">Watchlist</h3>
    <div id="d-wl"></div>
    <button class="btn btn-outline btn-sm" onclick="toggleWLForm()" style="margin-top:10px">+ Add to Watchlist</button>
    <div id="wl-form" style="display:none;margin-top:12px" class="card">
      <div class="field"><label>DL Number</label><input id="wl-dl"></div>
      <div class="field"><label>Last Name</label><input id="wl-last"></div>
      <div class="field"><label>Reason</label><input id="wl-reason"></div>
      <button class="btn btn-primary btn-sm" onclick="addWL()">Add</button>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav" id="nav" style="display:none">
    <button onclick="showS('s-scan')" id="n-scan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>Scan</button>
    <button onclick="showS('s-history');loadHistory()" id="n-hist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>History</button>
    <button onclick="showS('s-dash');loadDash()" id="n-dash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let TK=localStorage.getItem('stk')||'',US=JSON.parse(localStorage.getItem('sus')||'null'),CD={},cPhoto=null,cBlob=null;

function showS(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  const m={'s-scan':'n-scan','s-history':'n-hist','s-dash':'n-dash'};
  if(m[id])document.getElementById(m[id])?.classList.add('active');
}
function showApp(){
  document.getElementById('hdr').style.display='flex';
  document.getElementById('nav').style.display='flex';
  document.getElementById('ubadge').textContent=US?.display_name||'';
  showS('s-scan');
}

// AUTH
async function doLogin(){
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  document.getElementById('l-err').textContent='';
  document.getElementById('l-btn').textContent='Signing in...';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    TK=d.token;US=d;localStorage.setItem('stk',TK);localStorage.setItem('sus',JSON.stringify(US));showApp();
  }catch(e){document.getElementById('l-err').textContent=e.message||'Login failed';}
  document.getElementById('l-btn').textContent='Sign In';
}
if(TK&&US){fetch('/api/dashboard',{headers:{'x-auth-token':TK}}).then(r=>{if(r.ok)showApp();else throw 0;}).catch(()=>{TK='';US=null;localStorage.clear();});}
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// PHOTO CAPTURE
async function handlePhoto(input){
  const file=input.files[0];if(!file)return;input.value='';
  cBlob=file;
  const reader=new FileReader();reader.onload=()=>{cPhoto=reader.result;};reader.readAsDataURL(file);
  document.getElementById('ov').classList.remove('hidden');
  try{
    const form=new FormData();form.append('photo',file);
    const resp=await fetch('/api/decode-dl',{method:'POST',headers:{'x-auth-token':TK},body:form});
    const result=await resp.json();
    document.getElementById('ov').classList.add('hidden');
    if(result.success&&result.data){
      CD=result.data;showConfirm(result.data,true);toast('Barcode decoded','success');if(navigator.vibrate)navigator.vibrate(200);
    }else{CD={};showConfirm({},false);toast(result.error||'Could not read barcode. Enter details from photo.','info');}
  }catch(err){document.getElementById('ov').classList.add('hidden');CD={};showConfirm({},false);toast('Connection error','error');}
}

// CONFIRM
function showConfirm(data,decoded){
  document.getElementById('c-src').textContent=decoded?'Auto-decoded from barcode':'Photo captured — tap Edit to enter details';
  const img=document.getElementById('c-photo');if(cPhoto){img.src=cPhoto;img.style.display='block';}else{img.style.display='none';}
  const fs=[{k:'first_name',l:'First Name'},{k:'last_name',l:'Last Name'},{k:'dl_number',l:'DL Number',f:1},{k:'dob',l:'Date of Birth'},{k:'expiration',l:'Expiration'},{k:'address',l:'Address',f:1},{k:'city',l:'City'},{k:'state',l:'State'}];
  document.getElementById('c-fields').innerHTML=fs.map(f=>`<div class="card ${f.f?'full':''}"><div class="card-label">${f.l}</div><div class="card-value" style="${!data[f.k]?'color:var(--muted);font-style:italic':''}">${data[f.k]||(decoded?'—':'Tap Edit')}</div></div>`).join('');
  showS('s-confirm');
}
function editConfirm(){
  const fs=[{k:'first_name',l:'First Name'},{k:'last_name',l:'Last Name'},{k:'middle_name',l:'Middle Name'},{k:'dl_number',l:'DL Number'},{k:'dob',l:'DOB (MM/DD/YYYY)'},{k:'expiration',l:'Expiration'},{k:'address',l:'Address'},{k:'city',l:'City'},{k:'state',l:'State'},{k:'postal_code',l:'ZIP'}];
  const img=document.getElementById('e-photo');if(cPhoto){img.src=cPhoto;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('e-fields').innerHTML=fs.map(f=>`<div class="field"><label>${f.l}</label><input id="e-${f.k}" value="${CD[f.k]||''}" autocapitalize="${f.k==='state'?'characters':'words'}"></div>`).join('');
  showS('s-edit');
}
function saveEdit(){const ks=['first_name','last_name','middle_name','dl_number','dob','expiration','address','city','state','postal_code'];ks.forEach(k=>{CD[k]=document.getElementById('e-'+k)?.value||'';});showConfirm(CD,Object.values(CD).some(v=>v));}
function backConfirm(){showConfirm(CD,Object.values(CD).some(v=>v));}

// SUBMIT
async function confirmScan(){
  const form=new FormData();Object.entries(CD).forEach(([k,v])=>{if(k!=='raw')form.append(k,v);});
  if(cBlob)form.append('dl_photo',cBlob);
  try{const r=await fetch('/api/scans',{method:'POST',headers:{'x-auth-token':TK},body:form});const d=await r.json();showResult(d);}
  catch(e){toast('Failed to save','error');}
}
async function submitManual(){
  const data={first_name:document.getElementById('m-first').value,last_name:document.getElementById('m-last').value,dl_number:document.getElementById('m-dl').value,dob:document.getElementById('m-dob').value,expiration:document.getElementById('m-exp').value,state:document.getElementById('m-state').value,notes:document.getElementById('m-notes').value};
  try{const r=await fetch('/api/scans',{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':TK},body:JSON.stringify(data)});const d=await r.json();
  ['m-first','m-last','m-dl','m-dob','m-exp','m-notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('m-state').value='TN';showResult(d);}
  catch(e){toast('Failed','error');}
}
function showResult(d){
  const icon=document.getElementById('r-icon'),st=document.getElementById('r-status'),sc=document.getElementById('r-score'),fl=document.getElementById('r-flags');
  if(d.risk_score>=70){icon.textContent='!!!';st.textContent='FLAGGED';st.style.color='var(--red)';}
  else if(d.risk_score>=30){icon.textContent='!!';st.textContent='CAUTION';st.style.color='var(--amber)';}
  else{icon.textContent='OK';st.textContent='CLEARED';st.style.color='var(--green)';}
  const rc=d.risk_score>=70?'risk-high':d.risk_score>=30?'risk-med':'risk-low';
  sc.innerHTML=`<span class="risk-badge ${rc}">Risk: ${d.risk_score}</span>`;
  fl.innerHTML=(d.risk_flags||[]).map(f=>`<div style="margin-top:4px">${f}</div>`).join('');
  document.getElementById('r-detail').innerHTML=`<div class="card-label">Driver</div><div class="card-value">${CD.first_name||''} ${CD.last_name||''}</div><div style="margin-top:8px;font-size:13px;color:var(--muted)">${CD.dl_number?'DL: '+CD.dl_number:''}</div>`;
  if(navigator.vibrate&&d.risk_score>=70)navigator.vibrate([300,100,300]);
  showS('s-result');cPhoto=null;cBlob=null;CD={};
}

// HISTORY
async function loadHistory(){try{const r=await fetch('/api/scans?limit=30',{headers:{'x-auth-token':TK}});const s=await r.json();const l=document.getElementById('h-list');
  if(!s.length){l.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px">No scans yet</p>';return;}
  l.innerHTML=s.map(s=>{const rc=s.risk_score>=70?'risk-high':s.risk_score>=30?'risk-med':'risk-low';const t=new Date(s.created_at+'Z').toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  return`<div class="scan-item"><div><div class="scan-item-name">${s.first_name||''} ${s.last_name||'Unknown'}</div><div class="scan-item-meta">${s.dl_number||'No DL'} · ${t}</div></div><span class="risk-badge ${rc}">${s.risk_score}</span></div>`;}).join('');}catch(e){toast('Failed','error');}}

// DASHBOARD
async function loadDash(){try{const r=await fetch('/api/dashboard',{headers:{'x-auth-token':TK}});const d=await r.json();
  document.getElementById('d-stats').innerHTML=`<div class="stat-card"><div class="stat-num" style="color:var(--blue)">${d.today}</div><div class="stat-label">Today</div></div><div class="stat-card"><div class="stat-num" style="color:var(--red)">${d.flagged}</div><div class="stat-label">Flagged</div></div><div class="stat-card"><div class="stat-num">${d.total}</div><div class="stat-label">All Time</div></div><div class="stat-card"><div class="stat-num" style="color:var(--amber)">${d.watchlist}</div><div class="stat-label">Watchlist</div></div>`;
  document.getElementById('d-decode').innerHTML=d.decode?`ZXing-WASM · ${d.decode.rate}% success · ${d.decode.avg_ms}ms avg · ${d.decode.total} attempts`:'No decode data';
  loadWL();}catch(e){toast('Failed','error');}}
async function loadWL(){try{const r=await fetch('/api/watchlist',{headers:{'x-auth-token':TK}});const items=await r.json();
  document.getElementById('d-wl').innerHTML=items.length?items.map(w=>`<div class="scan-item"><div><div class="scan-item-name">${w.first_name||''} ${w.last_name||'—'}</div><div class="scan-item-meta">${w.dl_number||'No DL'} · ${w.reason||''}</div></div><button class="btn btn-red btn-sm" style="width:auto;padding:6px 12px;font-size:12px" onclick="rmWL('${w.id}')">X</button></div>`).join(''):'<p style="color:var(--muted);font-size:13px">Empty</p>';}catch(_){}}
function toggleWLForm(){const f=document.getElementById('wl-form');f.style.display=f.style.display==='none'?'block':'none';}
async function addWL(){try{await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':TK},body:JSON.stringify({dl_number:document.getElementById('wl-dl').value,last_name:document.getElementById('wl-last').value,reason:document.getElementById('wl-reason').value})});['wl-dl','wl-last','wl-reason'].forEach(id=>document.getElementById(id).value='');document.getElementById('wl-form').style.display='none';loadWL();toast('Added','success');}catch(e){toast('Failed','error');}}
async function rmWL(id){await fetch('/api/watchlist/'+id,{method:'DELETE',headers:{'x-auth-token':TK}});loadWL();}
function toast(msg,type){const t=document.getElementById('toast');t.className=`toast toast-${type||'info'} show`;t.textContent=msg;setTimeout(()=>t.classList.remove('show'),3500);}
</script>
