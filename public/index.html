<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Iron Halo Verify</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#14141f;--card:#1a1a2e;--border:#2a2a3e;--blue:#0056A0;--green:#00c853;--red:#ff3d3d;--amber:#ffab00;--text:#e8e8f0;--muted:#8888a0;--radius:12px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent;overflow:hidden}
input,button,select,textarea{font-family:inherit;font-size:inherit}
#app{height:100%;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;padding:16px;padding-bottom:100px}
.screen.active{display:flex}
.header{background:var(--surface);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.header h1{font-size:16px;font-weight:700;color:var(--blue)}
.header .ub{font-size:12px;color:var(--muted)}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;background:none;border:none;color:var(--muted);padding:10px 4px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.nav button.active{color:var(--blue)}
.nav button svg{width:22px;height:22px}
.btn{display:flex;align-items:center;justify-content:center;padding:16px 24px;border:none;border-radius:var(--radius);font-size:18px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s;-webkit-appearance:none}
.btn:active{opacity:.7}
.btn-primary{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}
.btn-sm{padding:10px 16px;font-size:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card-value{font-size:18px;font-weight:600}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-size:16px;-webkit-appearance:none}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--blue)}
.risk-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}
.risk-low{background:#1a3a1a;color:var(--green)}
.risk-med{background:#3a3a1a;color:var(--amber)}
.risk-high{background:#3a1a1a;color:var(--red)}
.scan-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:30px 20px}
.scan-btn-big{width:140px;height:140px;border-radius:50%;background:var(--blue);border:4px solid rgba(0,86,160,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 40px rgba(0,86,160,.2);transition:transform .15s}
.scan-btn-big:active{transform:scale(.95)}
.scan-btn-big svg{width:56px;height:56px;fill:#fff}
.confirm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.confirm-grid .card{margin-bottom:0}
.confirm-grid .full{grid-column:1/-1}
.toast{position:fixed;top:20px;left:16px;right:16px;padding:14px 16px;border-radius:10px;font-size:14px;font-weight:600;z-index:1000;transform:translateY(-120%);transition:transform .3s;text-align:center}
.toast.show{transform:translateY(0)}
.toast-success{background:var(--green);color:#000}
.toast-error{background:var(--red);color:#fff}
.toast-info{background:var(--blue);color:#fff}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:800}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.scan-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.scan-item-name{font-size:15px;font-weight:600}
.scan-item-meta{font-size:12px;color:var(--muted)}
.login-box{max-width:340px;margin:auto;width:100%}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h2{font-size:22px;color:var(--blue);margin-bottom:4px;letter-spacing:1px}
.login-logo p{font-size:13px;color:var(--muted)}
.manual-header{text-align:center;margin-bottom:18px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
.manual-header h2{font-size:17px;margin-bottom:4px}
.manual-header p{font-size:12px;color:var(--muted)}
.green-flash{animation:gflash .6s ease-out}
@keyframes gflash{0%{background:rgba(0,200,83,.3)}100%{background:transparent}}
.input-eye-wrap{position:relative}
.input-eye-wrap input{width:100%;padding-right:52px}
.eye-toggle{position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;font-size:13px;font-weight:600}
.scan-success-flash{position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;background:var(--green);pointer-events:none;animation:successFlash .6s ease-out forwards}
@keyframes successFlash{0%{opacity:.8}100%{opacity:0}}
#photo-status{text-align:center;font-size:13px;margin-top:8px;min-height:20px}
input[type=file]{display:none}
</style>
</head>
<body>
<div id="app">
  <div class="header" id="hdr" style="display:none">
    <h1>IRON HALO VERIFY</h1>
    <span class="ub" id="ubadge"></span>
  </div>

  <!-- LOGIN -->
  <div class="screen active" id="s-login">
    <div style="flex:1;display:flex;align-items:center;justify-content:center">
      <div class="login-box">
        <div class="login-logo"><h2>IRON HALO VERIFY</h2><p>Guard Verification System v6.0</p></div>
        <div class="field"><label>Username</label><input type="text" id="l-user" autocapitalize="none" autocomplete="username"></div>
        <div class="field"><label>Password</label>
          <div class="input-eye-wrap">
            <input type="password" id="l-pass" autocomplete="current-password">
            <button type="button" class="eye-toggle" id="eye-btn">Show</button>
          </div>
        </div>
        <button type="button" class="btn btn-primary" id="l-btn">Sign In</button>
        <p id="l-err" style="color:var(--red);text-align:center;margin-top:12px;font-size:13px"></p>
      </div>
    </div>
  </div>

  <!-- HOME — PHOTO ONLY -->
  <div class="screen" id="s-scan">
    <div class="scan-hero">
      <div class="scan-btn-big" id="big-photo-btn">
        <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 100-6.4 3.2 3.2 0 000 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
      </div>
      <div style="font-size:13px;color:var(--muted);text-align:center;max-width:260px">Tap to take photo of barcode on <strong>back</strong> of license</div>
      <button type="button" class="btn btn-primary" id="take-photo-btn" style="margin-top:8px;font-size:16px;padding:14px 20px;">TAKE PHOTO OF BARCODE</button>
      <div id="photo-status"></div>
    </div>
    <input type="file" id="photo-input" accept="image/*" capture="environment">
    <button type="button" class="btn btn-outline btn-sm" id="manual-btn" style="margin-top:auto">Manual Entry</button>
  </div>

  <!-- CONFIRM -->
  <div class="screen" id="s-confirm">
    <h2 style="margin-bottom:4px;font-size:18px">Verify Details</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px" id="c-src"></p>
    <div class="confirm-grid" id="c-fields"></div>
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px">
      <button type="button" class="btn btn-green" id="confirm-btn">CONFIRM &amp; SAVE</button>
      <div style="display:flex;gap:10px">
        <button type="button" class="btn btn-outline btn-sm" id="edit-btn" style="flex:1">Edit</button>
        <button type="button" class="btn btn-outline btn-sm" id="rescan-btn" style="flex:1">Re-scan</button>
      </div>
    </div>
  </div>

  <!-- EDIT -->
  <div class="screen" id="s-edit">
    <h2 style="margin-bottom:14px;font-size:18px">Edit Details</h2>
    <div id="e-fields"></div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button type="button" class="btn btn-green" id="save-edit-btn" style="flex:1">Save</button>
      <button type="button" class="btn btn-outline btn-sm" id="cancel-edit-btn" style="flex:1">Cancel</button>
    </div>
  </div>

  <!-- MANUAL -->
  <div class="screen" id="s-manual">
    <div class="manual-header" id="manual-hdr">
      <h2>Enter License Details</h2>
      <p>Record driver information manually</p>
    </div>
    <div class="field"><label>First Name</label><input id="m-first" autocapitalize="words"></div>
    <div class="field"><label>Last Name</label><input id="m-last" autocapitalize="words"></div>
    <div class="field"><label>DL Number</label><input id="m-dl" autocapitalize="characters"></div>
    <div class="field"><label>DOB (MM/DD/YYYY)</label><input id="m-dob" inputmode="numeric"></div>
    <div class="field"><label>Expiration</label><input id="m-exp" inputmode="numeric"></div>
    <div class="field"><label>State</label><input id="m-state" maxlength="2" autocapitalize="characters" value="TN"></div>
    <div class="field"><label>Notes</label><textarea id="m-notes" rows="2"></textarea></div>
    <button type="button" class="btn btn-green" id="submit-manual-btn">Submit</button>
    <button type="button" class="btn btn-outline btn-sm" id="back-to-scan-btn" style="margin-top:10px">Back</button>
  </div>

  <!-- RESULT -->
  <div class="screen" id="s-result">
    <div style="text-align:center;padding:30px 0">
      <div id="r-icon" style="font-size:64px;margin-bottom:12px"></div>
      <div id="r-status" style="font-size:22px;font-weight:800;margin-bottom:8px"></div>
      <div id="r-score"></div>
      <div id="r-flags" style="margin-top:12px;font-size:13px;color:var(--amber)"></div>
    </div>
    <div id="r-detail" class="card" style="margin-bottom:16px"></div>
    <button type="button" class="btn btn-primary" id="next-scan-btn">Next Scan</button>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="s-history">
    <h2 style="margin-bottom:14px;font-size:18px">Recent Scans</h2>
    <div id="h-list"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="screen" id="s-dash">
    <h2 style="margin-bottom:14px;font-size:18px">Dashboard</h2>
    <div class="stat-grid" id="d-stats"></div>
    <div class="card"><div class="card-label">Decode Engine</div><div style="font-size:14px;margin-top:4px">Dynamsoft v9.6.42 (photo decode)</div></div>
    <h3 style="font-size:14px;margin:14px 0 8px;color:var(--muted)">Watchlist</h3>
    <div id="d-wl"></div>
    <button type="button" class="btn btn-outline btn-sm" id="toggle-wl-btn" style="margin-top:10px">+ Add to Watchlist</button>
    <div id="wl-form" style="display:none;margin-top:12px" class="card">
      <div class="field"><label>DL Number</label><input id="wl-dl"></div>
      <div class="field"><label>Last Name</label><input id="wl-last"></div>
      <div class="field"><label>Reason</label><input id="wl-reason"></div>
      <button type="button" class="btn btn-primary btn-sm" id="add-wl-btn">Add</button>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav" id="nav" style="display:none">
    <button type="button" id="n-scan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>Scan</button>
    <button type="button" id="n-hist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>History</button>
    <button type="button" id="n-dash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// IRON HALO VERIFY v6.0 — REBUILT FROM FIRST PRINCIPLES
// Photo-only decode using EXACT pattern from test_scanner.html
// ═══════════════════════════════════════════════

// --- GLOBALS (same var style as working test_scanner.html) ---
var TK = localStorage.getItem('stk') || '';
var US = JSON.parse(localStorage.getItem('sus') || 'null');
var CD = {};
var reader = null;
var sdkLoaded = false;
var photoStatus = document.getElementById('photo-status');

// --- SCREEN SWITCHING ---
function showS(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  var navMap = {'s-scan':'n-scan','s-history':'n-hist','s-dash':'n-dash'};
  var navBtns = document.querySelectorAll('.nav button');
  for (var j = 0; j < navBtns.length; j++) navBtns[j].classList.remove('active');
  if (navMap[id]) document.getElementById(navMap[id]).classList.add('active');
  if (TK) {
    var showChrome = (id !== 's-login');
    document.getElementById('hdr').style.display = showChrome ? 'flex' : 'none';
    document.getElementById('nav').style.display = showChrome ? 'flex' : 'none';
  }
}

function showApp() {
  document.getElementById('hdr').style.display = 'flex';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('ubadge').textContent = US ? (US.display_name || '') : '';
  showS('s-scan');
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.className = 'toast toast-' + (type || 'info') + ' show';
  t.textContent = msg;
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}

// --- AUTH ---
document.getElementById('eye-btn').addEventListener('click', function() {
  var inp = document.getElementById('l-pass');
  var btn = document.getElementById('eye-btn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
  else { inp.type = 'password'; btn.textContent = 'Show'; }
});

document.getElementById('l-btn').addEventListener('click', function() {
  var u = document.getElementById('l-user').value.trim();
  var p = document.getElementById('l-pass').value;
  document.getElementById('l-err').textContent = '';
  document.getElementById('l-btn').textContent = 'Signing in...';
  fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})})
  .then(function(r) { return r.json().then(function(d) { if (!r.ok) throw new Error(d.error); return d; }); })
  .then(function(d) {
    TK = d.token; US = d;
    localStorage.setItem('stk', TK);
    localStorage.setItem('sus', JSON.stringify(US));
    showApp();
  })
  .catch(function(e) { document.getElementById('l-err').textContent = e.message || 'Login failed'; })
  .finally(function() { document.getElementById('l-btn').textContent = 'Sign In'; });
});

document.getElementById('l-pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('l-btn').click();
});

// Auto-login if token exists
if (TK && US) {
  fetch('/api/dashboard', {headers:{'x-auth-token':TK}})
  .then(function(r) { if (r.ok) { showApp(); } else { throw new Error('expired'); } })
  .catch(function() { TK = ''; US = null; localStorage.clear(); });
}

// ═══════════════════════════════════════════════
// DYNAMSOFT SDK — EXACT PATTERN FROM test_scanner.html
// ═══════════════════════════════════════════════
function loadScript(url) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = url;
    s.onload = function() { resolve(url); };
    s.onerror = function() { reject(new Error('Script load failed: ' + url)); };
    document.head.appendChild(s);
  });
}

async function loadSDK() {
  if (sdkLoaded && window.Dynamsoft) return;
  await loadScript('/dbr/dbr.js');
  if (!window.Dynamsoft) throw new Error('Dynamsoft global not found');
  sdkLoaded = true;
}

async function initDynamsoft() {
  await loadSDK();
  Dynamsoft.DBR.BarcodeReader.engineResourcePath = '/dbr/';
  Dynamsoft.DBR.BarcodeReader.license = 'DLS2eyJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSJ9';
  reader = await Dynamsoft.DBR.BarcodeReader.createInstance();
  var settings = await reader.getRuntimeSettings();
  settings.barcodeFormatIds = Dynamsoft.DBR.EnumBarcodeFormat.BF_PDF417;
  settings.expectedBarcodesCount = 1;
  settings.deblurLevel = 5;
  await reader.updateRuntimeSettings(settings);
}

// ═══════════════════════════════════════════════
// PHOTO BUTTON — EXACT PATTERN FROM test_scanner.html
// Both the big circle and the TAKE PHOTO button trigger the file input
// ═══════════════════════════════════════════════
document.getElementById('big-photo-btn').addEventListener('click', function() {
  document.getElementById('photo-input').click();
});

document.getElementById('take-photo-btn').addEventListener('click', function() {
  document.getElementById('photo-input').click();
});

// ═══════════════════════════════════════════════
// PHOTO DECODE — EXACT PATTERN FROM test_scanner.html
// ═══════════════════════════════════════════════
document.getElementById('photo-input').addEventListener('change', async function(e) {
  var file = e.target.files[0];
  if (!file) return;

  photoStatus.textContent = 'Decoding photo...';
  photoStatus.style.color = '#aaa';

  // Init Dynamsoft if needed (exact same as test_scanner.html)
  if (!reader) {
    try { await initDynamsoft(); }
    catch(err) {
      photoStatus.textContent = 'Could not load decoder. Try again.';
      photoStatus.style.color = '#f44';
      e.target.value = '';
      return;
    }
  }

  // Load photo into canvas (exact same as test_scanner.html)
  try {
    var img = new Image();
    var url = URL.createObjectURL(file);
    await new Promise(function(resolve, reject) { img.onload = resolve; img.onerror = reject; img.src = url; });
    var canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    URL.revokeObjectURL(url);

    photoStatus.textContent = 'Decoding ' + img.naturalWidth + 'x' + img.naturalHeight + ' image...';
    var t0 = Date.now();
    var results = await reader.decode(canvas);
    var elapsed = Date.now() - t0;

    if (results && results.length > 0 && results[0].barcodeText && results[0].barcodeText.length > 20) {
      photoStatus.textContent = 'Decoded in ' + elapsed + 'ms!';
      photoStatus.style.color = '#0f0';
      var parsed = parsePDF417(results[0].barcodeText);
      onDecodeSuccess(parsed);
    } else {
      photoStatus.textContent = 'No barcode found. Try again with good lighting.';
      photoStatus.style.color = '#f44';
    }
  } catch(err) {
    photoStatus.textContent = 'Could not read barcode. Try again or use Manual Entry.';
    photoStatus.style.color = '#f44';
  }

  e.target.value = '';
});

// ═══════════════════════════════════════════════
// DECODE SUCCESS
// ═══════════════════════════════════════════════
function onDecodeSuccess(fields) {
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
  var flash = document.createElement('div');
  flash.className = 'scan-success-flash';
  document.body.appendChild(flash);
  flash.addEventListener('animationend', function() { flash.remove(); });

  CD = fields;
  showConfirm(CD, true);
  toast('Barcode decoded!', 'success');
}

// ═══════════════════════════════════════════════
// AAMVA PARSER — EXACT PATTERN FROM test_scanner.html
// ═══════════════════════════════════════════════
function parsePDF417(raw) {
  var fields = {};
  var fieldMap = {
    'DCS':'last_name','DAB':'last_name','DAC':'first_name','DCT':'first_name',
    'DAD':'middle_name','DBB':'dob','DBA':'expiration','DAQ':'dl_number',
    'DAG':'address','DAI':'city','DAJ':'state','DAK':'postal_code','DBC':'sex'
  };

  // Method 1: line split
  var lines = raw.split(/[\r\n\x1e\x1d]+/);
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    for (var code in fieldMap) {
      if (line.indexOf(code) === 0) {
        var val = line.substring(code.length).trim();
        if (code === 'DCT' && fields.first_name) continue;
        if (code === 'DAB' && fields.last_name) continue;
        if (val) fields[fieldMap[code]] = val;
      }
    }
  }

  // Method 2: regex fallback
  for (var code in fieldMap) {
    if (!fields[fieldMap[code]]) {
      var re = new RegExp(code + '([^\\r\\n\\x1e\\x1d]{1,120}?)(?=D[A-Z]{2}|[\\r\\n\\x1e\\x1d]|$)');
      var m = re.exec(raw);
      if (m && m[1] && m[1].trim()) fields[fieldMap[code]] = m[1].trim();
    }
  }

  // Method 3: aggressive matchAll
  if (Object.keys(fields).length < 3) {
    var allMatches = raw.match(/(D[A-Z]{2})([\s\S]*?)(?=D[A-Z]{2}|$)/g);
    if (allMatches) {
      for (var k = 0; k < allMatches.length; k++) {
        var mc = allMatches[k].substring(0, 3);
        var mv = allMatches[k].substring(3).trim();
        if (fieldMap[mc] && mv && !fields[fieldMap[mc]]) fields[fieldMap[mc]] = mv;
      }
    }
  }

  // Format dates
  var dateFields = ['dob', 'expiration'];
  for (var d = 0; d < dateFields.length; d++) {
    var df = dateFields[d];
    if (fields[df] && fields[df].length >= 8) {
      var digits = fields[df].replace(/[^0-9]/g, '');
      if (digits.length === 8) {
        var first2 = parseInt(digits.slice(0, 2));
        if (first2 > 12) fields[df] = digits.slice(4,6) + '/' + digits.slice(6,8) + '/' + digits.slice(0,4);
        else fields[df] = digits.slice(0,2) + '/' + digits.slice(2,4) + '/' + digits.slice(4,8);
      }
    }
  }

  if (fields.sex === '1') fields.sex = 'M';
  else if (fields.sex === '2') fields.sex = 'F';
  if (fields.postal_code) fields.postal_code = fields.postal_code.replace(/\s+/g, '').substring(0, 5);

  // Title case names
  var nameFields = ['first_name', 'last_name', 'middle_name', 'city'];
  for (var n = 0; n < nameFields.length; n++) {
    if (fields[nameFields[n]]) {
      fields[nameFields[n]] = fields[nameFields[n]].charAt(0).toUpperCase() + fields[nameFields[n]].slice(1).toLowerCase();
    }
  }

  return fields;
}

// ═══════════════════════════════════════════════
// CONFIRM / EDIT
// ═══════════════════════════════════════════════
function showConfirm(data, decoded) {
  document.getElementById('c-src').textContent = decoded ? 'Auto-decoded from barcode' : 'Tap Edit to enter details';
  var fs = [
    {k:'first_name',l:'First Name'},{k:'last_name',l:'Last Name'},
    {k:'dl_number',l:'DL Number',f:1},{k:'dob',l:'Date of Birth'},
    {k:'expiration',l:'Expiration'},{k:'address',l:'Address',f:1},
    {k:'city',l:'City'},{k:'state',l:'State'}
  ];
  var html = '';
  for (var i = 0; i < fs.length; i++) {
    var f = fs[i];
    var val = data[f.k] || '';
    var cls = f.f ? 'card full' : 'card';
    if (decoded && val) cls += ' green-flash';
    var style = val ? '' : 'color:var(--muted);font-style:italic';
    html += '<div class="' + cls + '"><div class="card-label">' + f.l + '</div><div class="card-value" style="' + style + '">' + (val || (decoded ? '\u2014' : 'Tap Edit')) + '</div></div>';
  }
  document.getElementById('c-fields').innerHTML = html;
  showS('s-confirm');
}

document.getElementById('confirm-btn').addEventListener('click', function() {
  var form = new FormData();
  for (var k in CD) { if (k !== 'raw') form.append(k, CD[k]); }
  fetch('/api/scans', {method:'POST', headers:{'x-auth-token':TK}, body:form})
  .then(function(r) { return r.json(); })
  .then(function(d) { showResult(d); })
  .catch(function() { toast('Failed to save', 'error'); });
});

document.getElementById('edit-btn').addEventListener('click', function() {
  var fs = [
    {k:'first_name',l:'First Name'},{k:'last_name',l:'Last Name'},{k:'middle_name',l:'Middle Name'},
    {k:'dl_number',l:'DL Number'},{k:'dob',l:'DOB (MM/DD/YYYY)'},{k:'expiration',l:'Expiration'},
    {k:'address',l:'Address'},{k:'city',l:'City'},{k:'state',l:'State'},{k:'postal_code',l:'ZIP'}
  ];
  var html = '';
  for (var i = 0; i < fs.length; i++) {
    var f = fs[i];
    var cap = f.k === 'state' ? 'characters' : 'words';
    html += '<div class="field"><label>' + f.l + '</label><input id="e-' + f.k + '" value="' + (CD[f.k] || '') + '" autocapitalize="' + cap + '"></div>';
  }
  document.getElementById('e-fields').innerHTML = html;
  showS('s-edit');
});

document.getElementById('save-edit-btn').addEventListener('click', function() {
  var ks = ['first_name','last_name','middle_name','dl_number','dob','expiration','address','city','state','postal_code'];
  for (var i = 0; i < ks.length; i++) {
    var el = document.getElementById('e-' + ks[i]);
    CD[ks[i]] = el ? el.value : '';
  }
  showConfirm(CD, true);
});

document.getElementById('cancel-edit-btn').addEventListener('click', function() {
  showConfirm(CD, true);
});

document.getElementById('rescan-btn').addEventListener('click', function() {
  document.getElementById('photo-input').click();
});

// ═══════════════════════════════════════════════
// MANUAL ENTRY
// ═══════════════════════════════════════════════
document.getElementById('manual-btn').addEventListener('click', function() {
  document.getElementById('manual-hdr').innerHTML = '<h2>Enter License Details</h2><p>Record driver information manually</p>';
  clearManualFields();
  document.getElementById('m-notes').value = '';
  showS('s-manual');
  setTimeout(function() { document.getElementById('m-first').focus(); }, 100);
});

function clearManualFields() {
  var ids = ['m-first','m-last','m-dl','m-dob','m-exp'];
  for (var i = 0; i < ids.length; i++) document.getElementById(ids[i]).value = '';
  document.getElementById('m-state').value = 'TN';
}

document.getElementById('submit-manual-btn').addEventListener('click', function() {
  var data = {
    first_name: document.getElementById('m-first').value,
    last_name: document.getElementById('m-last').value,
    dl_number: document.getElementById('m-dl').value,
    dob: document.getElementById('m-dob').value,
    expiration: document.getElementById('m-exp').value,
    state: document.getElementById('m-state').value,
    notes: document.getElementById('m-notes').value
  };
  if (!data.first_name && !data.last_name) { toast('Enter at least a name', 'error'); return; }
  fetch('/api/scans', {method:'POST', headers:{'Content-Type':'application/json','x-auth-token':TK}, body:JSON.stringify(data)})
  .then(function(r) { return r.json(); })
  .then(function(d) { clearManualFields(); document.getElementById('m-notes').value = ''; showResult(d); })
  .catch(function() { toast('Failed', 'error'); });
});

document.getElementById('back-to-scan-btn').addEventListener('click', function() { showS('s-scan'); });

// ═══════════════════════════════════════════════
// RESULT
// ═══════════════════════════════════════════════
function showResult(d) {
  var icon = document.getElementById('r-icon');
  var st = document.getElementById('r-status');
  var sc = document.getElementById('r-score');
  var fl = document.getElementById('r-flags');
  if (d.risk_score >= 70) { icon.textContent = '!!!'; st.textContent = 'FLAGGED'; st.style.color = 'var(--red)'; }
  else if (d.risk_score >= 30) { icon.textContent = '!!'; st.textContent = 'CAUTION'; st.style.color = 'var(--amber)'; }
  else { icon.textContent = 'OK'; st.textContent = 'CLEARED'; st.style.color = 'var(--green)'; }
  var rc = d.risk_score >= 70 ? 'risk-high' : d.risk_score >= 30 ? 'risk-med' : 'risk-low';
  sc.innerHTML = '<span class="risk-badge ' + rc + '">Risk: ' + d.risk_score + '</span>';
  var flagHtml = '';
  if (d.risk_flags) { for (var i = 0; i < d.risk_flags.length; i++) flagHtml += '<div style="margin-top:4px">' + d.risk_flags[i] + '</div>'; }
  fl.innerHTML = flagHtml;
  document.getElementById('r-detail').innerHTML = '<div class="card-label">Driver</div><div class="card-value">' + (CD.first_name||'') + ' ' + (CD.last_name||'') + '</div><div style="margin-top:8px;font-size:13px;color:var(--muted)">' + (CD.dl_number ? 'DL: ' + CD.dl_number : '') + '</div>';
  if (navigator.vibrate && d.risk_score >= 70) navigator.vibrate([300, 100, 300]);
  showS('s-result');
  CD = {};
}

document.getElementById('next-scan-btn').addEventListener('click', function() { showS('s-scan'); });

// NAV

document.getElementById('n-scan').addEventListener('click', function() { showS('s-scan'); });

document.getElementById('n-dash').addEventListener('click', function() { showS('s-dash'); loadDash(); });

// ═══════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════
function loadHistory() {
  fetch('/api/scans?limit=30', {headers:{'x-auth-token':TK}})
  .then(function(r) { return r.json(); })
  .then(function(scans) {
    var el = document.getElementById('h-list');
    if (!scans.length) { el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">No scans yet</p>'; return; }
    var html = '';
    for (var i = 0; i < scans.length; i++) {
      var s = scans[i];
      var rc = s.risk_score >= 70 ? 'risk-high' : s.risk_score >= 30 ? 'risk-med' : 'risk-low';
      var t = new Date(s.created_at + 'Z').toLocaleString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
      html += '<div class="scan-item"><div><div class="scan-item-name">' + (s.first_name||'') + ' ' + (s.last_name||'Unknown') + '</div><div class="scan-item-meta">' + (s.dl_number||'No DL') + ' \u00b7 ' + t + '</div></div><span class="risk-badge ' + rc + '">' + s.risk_score + '</span></div>';
    }
    el.innerHTML = html;
  }).catch(function() { toast('Failed', 'error'); });
}

// ═══════════════════════════════════════════════
// DASHBOARD + WATCHLIST
// ═══════════════════════════════════════════════
function loadDash() {
  fetch('/api/dashboard', {headers:{'x-auth-token':TK}})
  .then(function(r) { return r.json(); })
  .then(function(d) {
    document.getElementById('d-stats').innerHTML = '<div class="stat-card"><div class="stat-num" style="color:var(--blue)">' + d.today + '</div><div class="stat-label">Today</div></div><div class="stat-card"><div class="stat-num" style="color:var(--red)">' + d.flagged + '</div><div class="stat-label">Flagged</div></div><div class="stat-card"><div class="stat-num">' + d.total + '</div><div class="stat-label">All Time</div></div><div class="stat-card"><div class="stat-num" style="color:var(--amber)">' + d.watchlist + '</div><div class="stat-label">Watchlist</div></div>';
    loadWL();
  }).catch(function() { toast('Failed', 'error'); });
}

function loadWL() {
  fetch('/api/watchlist', {headers:{'x-auth-token':TK}})
  .then(function(r) { return r.json(); })
  .then(function(items) {
    var el = document.getElementById('d-wl');
    if (!items.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px">Empty</p>'; return; }
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var w = items[i];
      html += '<div class="scan-item"><div><div class="scan-item-name">' + (w.first_name||'') + ' ' + (w.last_name||'\u2014') + '</div><div class="scan-item-meta">' + (w.dl_number||'No DL') + ' \u00b7 ' + (w.reason||'') + '</div></div><button type="button" class="btn btn-red btn-sm" style="width:auto;padding:6px 12px;font-size:12px" data-wl-id="' + w.id + '">X</button></div>';
    }
    el.innerHTML = html;
    // Attach delete handlers
    var delBtns = el.querySelectorAll('[data-wl-id]');
    for (var j = 0; j < delBtns.length; j++) {
      delBtns[j].addEventListener('click', function() {
        var id = this.getAttribute('data-wl-id');
        fetch('/api/watchlist/' + id, {method:'DELETE', headers:{'x-auth-token':TK}}).then(function() { loadWL(); });
      });
    }
  }).catch(function() {});
}

document.getElementById('toggle-wl-btn').addEventListener('click', function() {
  var f = document.getElementById('wl-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('add-wl-btn').addEventListener('click', function() {
  fetch('/api/watchlist', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-auth-token':TK},
    body:JSON.stringify({
      dl_number: document.getElementById('wl-dl').value,
      last_name: document.getElementById('wl-last').value,
      reason: document.getElementById('wl-reason').value
    })
  }).then(function() {
    document.getElementById('wl-dl').value = '';
    document.getElementById('wl-last').value = '';
    document.getElementById('wl-reason').value = '';
    document.getElementById('wl-form').style.display = 'none';
    loadWL();
    toast('Added', 'success');
  }).catch(function() { toast('Failed', 'error'); });
});
