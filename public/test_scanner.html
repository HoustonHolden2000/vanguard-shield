<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PDF417 Decode Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#eee;padding:16px;}
h1{font-size:18px;text-align:center;margin-bottom:8px;}
#status{text-align:center;color:#aaa;margin-bottom:12px;font-size:13px;word-break:break-all;}
.btn{display:block;width:100%;padding:18px;font-size:17px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin-bottom:10px;}
.btn:disabled{opacity:.4;}
.btn-blue{background:#0056A0;color:#fff;}
.btn-green{background:#1a7a1a;color:#fff;}
.btn-red{background:#c00;color:#fff;display:none;padding:14px;font-size:15px;}
.btn-gray{background:#555;color:#fff;display:none;padding:14px;font-size:15px;}
#video-box{position:relative;width:100%;background:#000;border-radius:8px;overflow:hidden;margin-bottom:12px;display:none;}
#video-box video{width:100%;display:block;}
.divider{text-align:center;color:#666;font-size:12px;margin:8px 0;border-top:1px solid #333;padding-top:8px;}
label{font-weight:600;font-size:13px;color:#aaa;margin-top:8px;display:block;}
textarea{width:100%;height:100px;background:#1a1a1a;color:#0f0;border:1px solid #333;border-radius:6px;padding:8px;font-family:monospace;font-size:11px;resize:vertical;}
.field{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 10px;margin-top:4px;font-size:14px;min-height:28px;}
.field.ok{border-color:#0a0;color:#0f0;}
#engine-info{text-align:center;color:#888;font-size:11px;margin-top:8px;}
input[type=file]{display:none;}
</style>
</head>
<body>

<h1>PDF417 Decode Test</h1>
<div id="status">Loading...</div>

<!-- TEST A: Live scan with Dynamsoft -->
<button id="btn-scan" class="btn btn-blue" onclick="startScan()" disabled>LIVE SCAN (Dynamsoft)</button>
<button id="btn-stop" class="btn btn-red" onclick="stopScan()">STOP SCANNER</button>
<button id="btn-retry-sdk" class="btn btn-gray" onclick="retrySdk()">RETRY LOADING SDK</button>

<div id="video-box"><video id="video" autoplay playsinline muted></video></div>

<div class="divider">— OR —</div>

<!-- TEST B: Photo upload to server -->
<button class="btn btn-green" onclick="document.getElementById('photo-input').click()">TAKE PHOTO OF BARCODE</button>
<input type="file" id="photo-input" accept="image/*" capture="environment">
<div id="photo-status" style="text-align:center;color:#aaa;font-size:12px;margin-bottom:8px;"></div>

<label>Raw PDF417 Text</label>
<textarea id="raw-output" readonly placeholder="(raw barcode text will appear here)"></textarea>

<label>Parsed Fields</label>
<div style="margin-top:4px;">
  <label style="margin:0;font-size:11px;">First Name</label><div class="field" id="f-first"></div>
  <label style="margin:0;font-size:11px;">Last Name</label><div class="field" id="f-last"></div>
  <label style="margin:0;font-size:11px;">DL Number</label><div class="field" id="f-dl"></div>
  <label style="margin:0;font-size:11px;">DOB</label><div class="field" id="f-dob"></div>
  <label style="margin:0;font-size:11px;">Expiration</label><div class="field" id="f-exp"></div>
  <label style="margin:0;font-size:11px;">Address</label><div class="field" id="f-addr"></div>
  <label style="margin:0;font-size:11px;">City</label><div class="field" id="f-city"></div>
  <label style="margin:0;font-size:11px;">State</label><div class="field" id="f-state"></div>
  <label style="margin:0;font-size:11px;">Postal Code</label><div class="field" id="f-zip"></div>
  <label style="margin:0;font-size:11px;">Sex</label><div class="field" id="f-sex"></div>
</div>
<div id="engine-info"></div>

<script>
// ═════════════════════════════════════════════
// GLOBALS
// ═════════════════════════════════════════════
var scanning = false;
var stream = null;
var reader = null;
var frameLoop = null;
var decodeCount = 0;
var sdkLoaded = false;

var statusEl = document.getElementById('status');
var videoBox = document.getElementById('video-box');
var videoEl = document.getElementById('video');
var rawOutput = document.getElementById('raw-output');
var btnScan = document.getElementById('btn-scan');
var btnStop = document.getElementById('btn-stop');
var photoStatus = document.getElementById('photo-status');

// ═════════════════════════════════════════════
// LOAD DYNAMSOFT SDK — self-hosted (no CDN)
// ═════════════════════════════════════════════
function loadScript(url) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = url;
    s.onload = function() { resolve(url); };
    s.onerror = function() { reject(new Error('Script load failed: ' + url)); };
    document.head.appendChild(s);
  });
}

async function loadSDK() {
  if (sdkLoaded && window.Dynamsoft) return;
  statusEl.textContent = 'Loading Dynamsoft SDK from server...';
  await loadScript('/dbr/dbr.js');
  if (!window.Dynamsoft) throw new Error('Dynamsoft global not found after script load');
  sdkLoaded = true;
  statusEl.textContent = 'SDK loaded from server.';
}

// ═════════════════════════════════════════════
// DYNAMSOFT INIT
// ═════════════════════════════════════════════
async function initDynamsoft() {
  await loadSDK();
  if (typeof Dynamsoft === 'undefined') throw new Error('Dynamsoft not available');
  statusEl.textContent = 'Creating BarcodeReader...';
  Dynamsoft.DBR.BarcodeReader.engineResourcePath = '/dbr/';
  Dynamsoft.DBR.BarcodeReader.license = 'DLS2eyJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSJ9';
  reader = await Dynamsoft.DBR.BarcodeReader.createInstance();
  var settings = await reader.getRuntimeSettings();
  settings.barcodeFormatIds = Dynamsoft.DBR.EnumBarcodeFormat.BF_PDF417;
  settings.expectedBarcodesCount = 1;
  settings.deblurLevel = 5;
  await reader.updateRuntimeSettings(settings);
  statusEl.textContent = 'Dynamsoft ready.';
}

// ═════════════════════════════════════════════
// TEST A: LIVE SCAN
// ═════════════════════════════════════════════
async function startScan() {
  btnScan.disabled = true;
  decodeCount = 0;
  if (!reader) {
    try { await initDynamsoft(); }
    catch(e) {
      statusEl.textContent = 'SDK error: ' + e.message;
      document.getElementById('btn-retry-sdk').style.display = 'block';
      btnScan.disabled = false;
      return;
    }
  }
  statusEl.textContent = 'Opening camera...';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
    });
  } catch(e) {
    statusEl.textContent = 'Camera error: ' + e.message;
    btnScan.disabled = false;
    return;
  }
  videoEl.srcObject = stream;
  await videoEl.play();
  videoBox.style.display = 'block';
  btnStop.style.display = 'block';
  scanning = true;
  statusEl.textContent = 'Scanning... point at barcode on BACK of license';

  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  function decodeFrame() {
    if (!scanning) return;
    if (videoEl.readyState >= videoEl.HAVE_CURRENT_DATA) {
      canvas.width = videoEl.videoWidth;
      canvas.height = videoEl.videoHeight;
      ctx.drawImage(videoEl, 0, 0);
      decodeCount++;
      if (decodeCount % 10 === 0) statusEl.textContent = 'Scanning... (' + decodeCount + ' frames)';
      reader.decode(canvas).then(function(results) {
        if (results && results.length > 0 && results[0].barcodeText && results[0].barcodeText.length > 20) {
          onDecoded(results[0].barcodeText, 'dynamsoft-live');
          return;
        }
        frameLoop = requestAnimationFrame(decodeFrame);
      }).catch(function() { frameLoop = requestAnimationFrame(decodeFrame); });
    } else {
      frameLoop = requestAnimationFrame(decodeFrame);
    }
  }
  frameLoop = requestAnimationFrame(decodeFrame);
}

function stopScan() {
  scanning = false;
  if (frameLoop) { cancelAnimationFrame(frameLoop); frameLoop = null; }
  if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
  videoBox.style.display = 'none';
  btnStop.style.display = 'none';
  btnScan.disabled = false;
  statusEl.textContent = 'Stopped after ' + decodeCount + ' frames.';
}

function retrySdk() {
  sdkLoaded = false;
  reader = null;
  document.getElementById('btn-retry-sdk').style.display = 'none';
  startScan();
}

// ═════════════════════════════════════════════
// TEST B: PHOTO → CLIENT-SIDE DYNAMSOFT DECODE
// ═════════════════════════════════════════════
document.getElementById('photo-input').addEventListener('change', async function(e) {
  var file = e.target.files[0];
  if (!file) return;

  photoStatus.textContent = 'Decoding photo client-side...';
  photoStatus.style.color = '#aaa';

  // Init Dynamsoft if needed
  if (!reader) {
    try { await initDynamsoft(); }
    catch(err) {
      photoStatus.textContent = 'SDK error: ' + err.message;
      photoStatus.style.color = '#f44';
      e.target.value = '';
      return;
    }
  }

  // Load photo into canvas
  try {
    var img = new Image();
    var url = URL.createObjectURL(file);
    await new Promise(function(resolve, reject) { img.onload = resolve; img.onerror = reject; img.src = url; });
    var canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    URL.revokeObjectURL(url);

    photoStatus.textContent = 'Decoding ' + img.naturalWidth + 'x' + img.naturalHeight + ' image...';
    var t0 = Date.now();
    var results = await reader.decode(canvas);
    var elapsed = Date.now() - t0;

    if (results && results.length > 0 && results[0].barcodeText && results[0].barcodeText.length > 20) {
      photoStatus.textContent = 'Decoded in ' + elapsed + 'ms!';
      photoStatus.style.color = '#0f0';
      onDecoded(results[0].barcodeText, 'dynamsoft-photo');
    } else {
      photoStatus.textContent = 'No barcode found in photo (' + elapsed + 'ms). Try again — hold camera steady, good lighting.';
      photoStatus.style.color = '#f44';
    }
  } catch(err) {
    photoStatus.textContent = 'Decode error: ' + err.message;
    photoStatus.style.color = '#f44';
  }

  e.target.value = '';
});

// ═════════════════════════════════════════════
// ON DECODED (shared by both paths)
// ═════════════════════════════════════════════
function onDecoded(rawText, engine) {
  scanning = false;
  if (frameLoop) { cancelAnimationFrame(frameLoop); frameLoop = null; }
  if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
  videoBox.style.display = 'none';
  btnStop.style.display = 'none';
  btnScan.disabled = false;

  statusEl.textContent = 'DECODED! (' + engine + ', ' + rawText.length + ' chars)';
  rawOutput.value = rawText;

  var fields = parseAAMVA(rawText);
  showFields(fields);

  document.getElementById('engine-info').textContent = 'Engine: ' + engine + ' | Raw length: ' + rawText.length + ' chars';
}

// ═════════════════════════════════════════════
// AAMVA PARSER
// ═════════════════════════════════════════════
function parseAAMVA(raw) {
  var fields = {};
  var fieldMap = {
    'DCS':'last_name','DAC':'first_name','DAQ':'dl_number',
    'DBB':'dob','DBA':'expiration','DAG':'address',
    'DAI':'city','DAJ':'state','DAK':'postal_code','DBC':'sex'
  };

  // Method 1: line split
  var lines = raw.split(/[\r\n]+/);
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    for (var code in fieldMap) {
      if (line.indexOf(code) === 0) {
        var val = line.substring(code.length).trim();
        if (val && !fields[fieldMap[code]]) fields[fieldMap[code]] = val;
      }
    }
  }

  // Method 2: regex lookahead
  for (var code in fieldMap) {
    if (!fields[fieldMap[code]]) {
      var re = new RegExp(code + '([^\\r\\n]*?)(?=[A-Z]{2}[A-Z0-9]|$)');
      var m = raw.match(re);
      if (m && m[1].trim()) fields[fieldMap[code]] = m[1].trim();
    }
  }

  // Method 3: aggressive matchAll
  for (var code in fieldMap) {
    if (!fields[fieldMap[code]]) {
      var re2 = new RegExp(code + '(.+?)(?=[A-Z]{3}|\\n|\\r|$)', 'g');
      var matches = Array.from(raw.matchAll(re2));
      if (matches.length > 0 && matches[0][1].trim()) {
        fields[fieldMap[code]] = matches[0][1].trim();
      }
    }
  }

  // Format dates
  if (fields.dob && /^\d{8}$/.test(fields.dob))
    fields.dob = fields.dob.substring(0,2)+'/'+fields.dob.substring(2,4)+'/'+fields.dob.substring(4);
  if (fields.expiration && /^\d{8}$/.test(fields.expiration))
    fields.expiration = fields.expiration.substring(0,2)+'/'+fields.expiration.substring(2,4)+'/'+fields.expiration.substring(4);

  if (fields.sex === '1') fields.sex = 'Male';
  else if (fields.sex === '2') fields.sex = 'Female';
  if (fields.postal_code) fields.postal_code = fields.postal_code.replace(/\s+/g,'').substring(0,5);

  return fields;
}

// ═════════════════════════════════════════════
// SHOW FIELDS
// ═════════════════════════════════════════════
function showFields(f) {
  var map = {
    'f-first':f.first_name,'f-last':f.last_name,'f-dl':f.dl_number,
    'f-dob':f.dob,'f-exp':f.expiration,'f-addr':f.address,
    'f-city':f.city,'f-state':f.state,'f-zip':f.postal_code,'f-sex':f.sex
  };
  for (var id in map) {
    var el = document.getElementById(id);
    el.textContent = map[id] || '(empty)';
    if (map[id]) el.classList.add('ok');
    else el.classList.remove('ok');
  }
}

// ═════════════════════════════════════════════
// AUTO-LOAD SDK ON PAGE LOAD
// ═════════════════════════════════════════════
loadSDK().then(function() {
  statusEl.textContent = 'SDK loaded. Ready to scan.';
  btnScan.disabled = false;
}).catch(function(e) {
  statusEl.textContent = 'SDK error: ' + e.message + ' — Use TAKE PHOTO button instead.';
  document.getElementById('btn-retry-sdk').style.display = 'block';
  btnScan.disabled = false;
});
</script>
</body>
</html>
