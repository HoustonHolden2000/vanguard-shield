<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PDF417 Decode Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#eee;padding:16px;}
h1{font-size:18px;text-align:center;margin-bottom:12px;}
#status{text-align:center;color:#aaa;margin-bottom:12px;font-size:13px;}
#btn-scan{display:block;width:100%;padding:18px;font-size:18px;font-weight:700;background:#0056A0;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-bottom:12px;}
#btn-scan:disabled{opacity:.5;}
#btn-stop{display:none;width:100%;padding:14px;font-size:16px;font-weight:700;background:#c00;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-bottom:12px;}
#video-box{position:relative;width:100%;background:#000;border-radius:8px;overflow:hidden;margin-bottom:12px;display:none;}
#video-box video{width:100%;display:block;}
label{font-weight:600;font-size:13px;color:#aaa;margin-top:8px;display:block;}
textarea{width:100%;height:120px;background:#1a1a1a;color:#0f0;border:1px solid #333;border-radius:6px;padding:8px;font-family:monospace;font-size:11px;resize:vertical;}
.field{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 10px;margin-top:4px;font-size:14px;min-height:28px;}
.field.ok{border-color:#0a0;color:#0f0;}
#engine-info{text-align:center;color:#888;font-size:11px;margin-top:8px;}
</style>
</head>
<body>

<h1>PDF417 Decode Test — TN License</h1>
<div id="status">Ready. Tap button to start scanning.</div>
<button id="btn-scan" onclick="startScan()">SCAN TN LICENSE (TEST)</button>
<button id="btn-stop" onclick="stopScan()">STOP SCANNER</button>

<div id="video-box"><video id="video" autoplay playsinline muted></video></div>

<label>Raw PDF417 Text</label>
<textarea id="raw-output" readonly placeholder="(raw barcode text will appear here)"></textarea>

<label>Parsed Fields</label>
<div style="margin-top:4px;">
  <label style="margin:0;font-size:11px;">First Name</label><div class="field" id="f-first"></div>
  <label style="margin:0;font-size:11px;">Last Name</label><div class="field" id="f-last"></div>
  <label style="margin:0;font-size:11px;">DL Number</label><div class="field" id="f-dl"></div>
  <label style="margin:0;font-size:11px;">DOB</label><div class="field" id="f-dob"></div>
  <label style="margin:0;font-size:11px;">Expiration</label><div class="field" id="f-exp"></div>
  <label style="margin:0;font-size:11px;">Address</label><div class="field" id="f-addr"></div>
  <label style="margin:0;font-size:11px;">City</label><div class="field" id="f-city"></div>
  <label style="margin:0;font-size:11px;">State</label><div class="field" id="f-state"></div>
  <label style="margin:0;font-size:11px;">Postal Code</label><div class="field" id="f-zip"></div>
  <label style="margin:0;font-size:11px;">Sex</label><div class="field" id="f-sex"></div>
</div>
<div id="engine-info"></div>

<!-- Dynamsoft BarcodeReader v9.6.42 -->
<script src="https://cdn.jsdelivr.net/npm/dynamsoft-javascript-barcode@9.6.42/dist/dbr.js"></script>

<script>
// ═════════════════════════════════════════════
// GLOBALS
// ═════════════════════════════════════════════
let scanning = false;
let stream = null;
let reader = null;
let frameLoop = null;
let decodeCount = 0;

const statusEl = document.getElementById('status');
const videoBox = document.getElementById('video-box');
const videoEl = document.getElementById('video');
const rawOutput = document.getElementById('raw-output');
const btnScan = document.getElementById('btn-scan');
const btnStop = document.getElementById('btn-stop');

// ═════════════════════════════════════════════
// DYNAMSOFT INIT
// ═════════════════════════════════════════════
async function initDynamsoft() {
  statusEl.textContent = 'Loading Dynamsoft BarcodeReader...';
  Dynamsoft.DBR.BarcodeReader.license = 'DLS2eyJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSJ9';
  reader = await Dynamsoft.DBR.BarcodeReader.createInstance();
  const settings = await reader.getRuntimeSettings();
  settings.barcodeFormatIds = Dynamsoft.DBR.EnumBarcodeFormat.BF_PDF417;
  settings.expectedBarcodesCount = 1;
  settings.deblurLevel = 5;
  await reader.updateRuntimeSettings(settings);
  statusEl.textContent = 'Dynamsoft ready. Tap SCAN.';
}

// ═════════════════════════════════════════════
// START SCAN
// ═════════════════════════════════════════════
async function startScan() {
  btnScan.disabled = true;
  decodeCount = 0;

  // Init Dynamsoft if not done
  if (!reader) {
    try {
      await initDynamsoft();
    } catch (e) {
      statusEl.textContent = 'Dynamsoft load error: ' + e.message;
      btnScan.disabled = false;
      return;
    }
  }

  // Open camera
  statusEl.textContent = 'Opening camera...';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
  } catch (e) {
    statusEl.textContent = 'Camera error: ' + e.message;
    btnScan.disabled = false;
    return;
  }

  videoEl.srcObject = stream;
  await videoEl.play();

  videoBox.style.display = 'block';
  btnStop.style.display = 'block';
  scanning = true;

  statusEl.textContent = 'Scanning... point at barcode on BACK of license';

  // Start frame decode loop
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  function decodeFrame() {
    if (!scanning) return;
    if (videoEl.readyState >= videoEl.HAVE_CURRENT_DATA) {
      canvas.width = videoEl.videoWidth;
      canvas.height = videoEl.videoHeight;
      ctx.drawImage(videoEl, 0, 0);
      decodeCount++;
      if (decodeCount % 10 === 0) {
        statusEl.textContent = 'Scanning... (' + decodeCount + ' frames tried)';
      }

      reader.decode(canvas).then(results => {
        if (results && results.length > 0) {
          const text = results[0].barcodeText;
          if (text && text.length > 20) {
            onDecoded(text, 'dynamsoft-live');
            return;
          }
        }
        frameLoop = requestAnimationFrame(decodeFrame);
      }).catch(() => {
        frameLoop = requestAnimationFrame(decodeFrame);
      });
    } else {
      frameLoop = requestAnimationFrame(decodeFrame);
    }
  }
  frameLoop = requestAnimationFrame(decodeFrame);
}

// ═════════════════════════════════════════════
// STOP SCAN
// ═════════════════════════════════════════════
function stopScan() {
  scanning = false;
  if (frameLoop) { cancelAnimationFrame(frameLoop); frameLoop = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  videoBox.style.display = 'none';
  btnStop.style.display = 'none';
  btnScan.disabled = false;
  statusEl.textContent = 'Stopped after ' + decodeCount + ' frames. Tap SCAN to retry.';
}

// ═════════════════════════════════════════════
// ON DECODED
// ═════════════════════════════════════════════
function onDecoded(rawText, engine) {
  scanning = false;
  if (frameLoop) { cancelAnimationFrame(frameLoop); frameLoop = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  videoBox.style.display = 'none';
  btnStop.style.display = 'none';
  btnScan.disabled = false;

  statusEl.textContent = 'DECODED! (' + engine + ', ' + decodeCount + ' frames, ' + rawText.length + ' chars)';
  rawOutput.value = rawText;

  const fields = parseAAMVA(rawText);
  showFields(fields);

  document.getElementById('engine-info').textContent = 'Engine: ' + engine + ' | Raw length: ' + rawText.length + ' chars';
}

// ═════════════════════════════════════════════
// AAMVA PARSER (same logic as Iron Halo)
// ═════════════════════════════════════════════
function parseAAMVA(raw) {
  const fields = {};
  const fieldMap = {
    'DCS': 'last_name', 'DAC': 'first_name', 'DAQ': 'dl_number',
    'DBB': 'dob', 'DBA': 'expiration', 'DAG': 'address',
    'DAI': 'city', 'DAJ': 'state', 'DAK': 'postal_code', 'DBC': 'sex'
  };

  // Method 1: Line-based split
  const lines = raw.split(/[\r\n]+/);
  for (const line of lines) {
    for (const [code, key] of Object.entries(fieldMap)) {
      if (line.startsWith(code)) {
        const val = line.substring(code.length).trim();
        if (val && !fields[key]) fields[key] = val;
      }
    }
  }

  // Method 2: Regex with lookahead for next 3-char code
  for (const [code, key] of Object.entries(fieldMap)) {
    if (!fields[key]) {
      const regex = new RegExp(code + '([^\\r\\n]*?)(?=[A-Z]{2}[A-Z0-9]|$)');
      const match = raw.match(regex);
      if (match && match[1].trim()) fields[key] = match[1].trim();
    }
  }

  // Method 3: Aggressive matchAll
  for (const [code, key] of Object.entries(fieldMap)) {
    if (!fields[key]) {
      const regex = new RegExp(code + '(.+?)(?=[A-Z]{3}|\\n|\\r|$)', 'g');
      const matches = [...raw.matchAll(regex)];
      if (matches.length > 0 && matches[0][1].trim()) {
        fields[key] = matches[0][1].trim();
      }
    }
  }

  // Format DOB/expiration
  if (fields.dob && /^\d{8}$/.test(fields.dob)) {
    fields.dob = fields.dob.substring(0,2)+'/'+fields.dob.substring(2,4)+'/'+fields.dob.substring(4);
  }
  if (fields.expiration && /^\d{8}$/.test(fields.expiration)) {
    fields.expiration = fields.expiration.substring(0,2)+'/'+fields.expiration.substring(2,4)+'/'+fields.expiration.substring(4);
  }

  // Format sex
  if (fields.sex === '1') fields.sex = 'Male';
  else if (fields.sex === '2') fields.sex = 'Female';

  // Clean postal code
  if (fields.postal_code) fields.postal_code = fields.postal_code.replace(/\s+/g,'').substring(0,5);

  return fields;
}

// ═════════════════════════════════════════════
// SHOW FIELDS
// ═════════════════════════════════════════════
function showFields(f) {
  const map = {
    'f-first': f.first_name, 'f-last': f.last_name, 'f-dl': f.dl_number,
    'f-dob': f.dob, 'f-exp': f.expiration, 'f-addr': f.address,
    'f-city': f.city, 'f-state': f.state, 'f-zip': f.postal_code, 'f-sex': f.sex
  };
  for (const [id, val] of Object.entries(map)) {
    const el = document.getElementById(id);
    el.textContent = val || '(empty)';
    if (val) el.classList.add('ok');
    else el.classList.remove('ok');
  }
}
</script>
</body>
</html>
